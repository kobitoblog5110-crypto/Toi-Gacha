<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問いガチャ ✨</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Hiragino Mincho ProN','Yu Mincho',serif;
    background:#05060f;
    color:#e8e8ff;
    user-select:none;
  }
  #bg{position:fixed;inset:0;z-index:0}
  #fx{position:fixed;inset:0;z-index:2;pointer-events:none}
  .nebula{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background:
      radial-gradient(ellipse 50% 40% at 25% 30%, rgba(120,80,200,0.18), transparent 60%),
      radial-gradient(ellipse 40% 35% at 75% 70%, rgba(80,140,220,0.15), transparent 60%);
  }

  #app{
    position:relative;z-index:3;height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:24px 16px;gap:20px;
  }

  header{
    width:100%;max-width:680px;
    display:flex;justify-content:space-between;align-items:center;
  }
  h1{
    font-size:16px;letter-spacing:0.4em;
    background:linear-gradient(90deg,#ffe9a8,#b8c8ff,#ffe9a8);
    background-size:200% auto;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:shimmer 6s linear infinite;
  }
  @keyframes shimmer{to{background-position:200% center}}
  .stats{display:flex;gap:14px;font-size:11px;color:#b8c8ff;letter-spacing:0.1em}
  .stats b{color:#ffe9a8}

  /* ===== オーブ ===== */
  .stage{
    flex:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    width:100%;max-width:680px;position:relative;
  }
  .orb-wrap{
    width:200px;height:200px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;position:relative;
  }
  .orb{
    width:140px;height:140px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#fff,#ffe9a8 18%,#b88aff 50%,#2a1560 90%);
    box-shadow:
      0 0 30px rgba(184,138,255,0.7),
      0 0 80px rgba(255,233,168,0.3),
      inset -8px -8px 24px rgba(0,0,0,0.4);
    animation:float 4s ease-in-out infinite, pulse 2.4s ease-in-out infinite;
    transition:transform .3s;
  }
  .orb-wrap:hover .orb{transform:scale(1.06)}
  .orb-wrap::before{
    content:'';position:absolute;inset:-10px;border-radius:50%;
    border:1px solid rgba(255,233,168,0.3);
    animation:ringSpin 12s linear infinite;
  }
  .orb-wrap::after{
    content:'';position:absolute;inset:-30px;border-radius:50%;
    border:1px dashed rgba(184,200,255,0.15);
    animation:ringSpin 24s linear infinite reverse;
  }
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes pulse{
    0%,100%{box-shadow:0 0 30px rgba(184,138,255,0.7),0 0 80px rgba(255,233,168,0.3),inset -8px -8px 24px rgba(0,0,0,0.4)}
    50%{box-shadow:0 0 50px rgba(184,138,255,1),0 0 120px rgba(255,233,168,0.5),inset -8px -8px 24px rgba(0,0,0,0.4)}
  }
  @keyframes ringSpin{to{transform:rotate(360deg)}}
  .orb-wrap.drawing .orb{animation:explode 1.2s cubic-bezier(.5,0,.5,1) forwards}
  @keyframes explode{
    0%{transform:scale(1)}
    40%{transform:scale(0.4) rotate(180deg);filter:brightness(2.5)}
    100%{transform:scale(2.5) rotate(360deg);opacity:0;filter:brightness(4) blur(6px)}
  }

  .hint{
    margin-top:24px;font-size:11px;letter-spacing:0.4em;
    color:#8090c0;animation:hintPulse 2s ease-in-out infinite;
  }
  @keyframes hintPulse{0%,100%{opacity:0.5}50%{opacity:1}}

  /* ===== カード ===== */
  .card{
    width:100%;max-width:520px;
    background:linear-gradient(135deg,rgba(40,30,80,0.7),rgba(20,15,50,0.7));
    border:1px solid rgba(255,233,168,0.3);
    border-radius:18px;padding:28px 24px;text-align:center;
    backdrop-filter:blur(10px);
    box-shadow:0 8px 40px rgba(0,0,0,0.5);
    display:none;
  }
  .card.show{display:block;animation:cardIn 0.9s cubic-bezier(.34,1.56,.64,1)}
  @keyframes cardIn{
    0%{transform:scale(0.2) translateY(60px);opacity:0;filter:blur(20px)}
    60%{transform:scale(1.05);opacity:1;filter:blur(0)}
    100%{transform:scale(1)}
  }
  .card.r-rare{border-color:#7ab8ff;box-shadow:0 0 40px rgba(122,184,255,0.5)}
  .card.r-epic{border-color:#c97aff;animation:cardIn 0.9s cubic-bezier(.34,1.56,.64,1),epicGlow 2s ease-in-out infinite alternate 1s}
  .card.r-legend{border-color:#ffd070;animation:cardIn 0.9s cubic-bezier(.34,1.56,.64,1),legendGlow 2s ease-in-out infinite alternate 1s}
  @keyframes epicGlow{from{box-shadow:0 0 30px rgba(201,122,255,0.5)}to{box-shadow:0 0 60px rgba(201,122,255,0.9)}}
  @keyframes legendGlow{from{box-shadow:0 0 40px rgba(255,208,112,0.6)}to{box-shadow:0 0 80px rgba(255,208,112,1)}}

  .badge{
    display:inline-block;font-size:10px;padding:4px 14px;border-radius:12px;
    letter-spacing:0.3em;margin-bottom:14px;
  }
  .b-common{background:rgba(150,150,200,0.25);color:#c0c0e0}
  .b-rare{background:rgba(100,180,255,0.25);color:#a0d0ff}
  .b-epic{background:rgba(200,130,255,0.25);color:#d8b0ff}
  .b-legend{
    background:linear-gradient(90deg,rgba(255,200,100,0.4),rgba(255,150,200,0.4),rgba(255,200,100,0.4));
    background-size:200% auto;color:#fff0c0;animation:shimmer 2s linear infinite;
  }
  .cat{font-size:11px;letter-spacing:0.3em;color:#ffe9a8;margin-bottom:16px;opacity:0.8}
  .qtext{
    font-size:19px;line-height:1.8;color:#fff;
    text-shadow:0 0 12px rgba(255,233,168,0.3);
  }

  /* ===== ボタン ===== */
  .controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  button{
    background:linear-gradient(135deg,#3a3080,#5a2080);
    color:#fff;border:1px solid rgba(255,233,168,0.4);
    padding:10px 22px;font-family:inherit;font-size:12px;
    letter-spacing:0.2em;border-radius:24px;cursor:pointer;
    transition:all .3s;
  }
  button:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,233,168,0.4);border-color:#ffe9a8}
  button.primary{
    background:linear-gradient(135deg,#ffae3b,#ff5e8a);
    color:#1a0030;font-weight:bold;
  }

  /* ===== フラッシュ ===== */
  .flash-text{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-size:42px;letter-spacing:0.5em;
    color:#ffe9a8;text-shadow:0 0 30px #ffe9a8,0 0 60px #ff8060;
    pointer-events:none;z-index:50;opacity:0;white-space:nowrap;
  }
  .flash-text.show{animation:flash 1.4s ease-out forwards}
  @keyframes flash{
    0%{opacity:0;transform:translate(-50%,-50%) scale(0.3);filter:blur(20px)}
    30%{opacity:1;transform:translate(-50%,-50%) scale(1.1);filter:blur(0)}
    70%{opacity:1}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1.4);filter:blur(8px)}
  }
  .screen-flash{
    position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0;
    background:radial-gradient(circle,rgba(255,255,255,0.85),transparent 70%);
  }
  .screen-flash.show{animation:sf 0.5s ease-out}
  @keyframes sf{0%{opacity:0}30%{opacity:1}100%{opacity:0}}

  .toast{
    position:fixed;top:20px;left:50%;transform:translateX(-50%);
    background:rgba(20,20,50,0.95);border:1px solid #ffe9a8;color:#ffe9a8;
    padding:11px 22px;border-radius:22px;font-size:12px;letter-spacing:0.2em;
    z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;
  }
  .toast.show{opacity:1}

  .empty-msg{
    text-align:center;color:#8090c0;font-size:13px;
    line-height:2;letter-spacing:0.1em;
  }
  .empty-msg a{color:#ffe9a8}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="nebula"></div>
<canvas id="fx"></canvas>
<div class="screen-flash" id="screenFlash"></div>
<div class="flash-text" id="flashText"></div>

<div id="app">
  <header>
    <h1>問 い ガ チ ャ</h1>
    <div class="stats">
      <div>🎴 <b id="drawCount">0</b></div>
      <div>📚 <b id="totalQ">0</b></div>
    </div>
  </header>

  <div class="stage">
    <div class="orb-wrap" id="orbWrap">
      <div class="orb"></div>
    </div>
    <div class="hint" id="hint">星 を タ ッ プ</div>

    <div class="card" id="card" style="margin-top:20px;">
      <div id="badge" class="badge">―</div>
      <div id="cat" class="cat">―</div>
      <div id="qtext" class="qtext">―</div>
    </div>

    <div id="emptyMsg" class="empty-msg" style="margin-top:20px;display:none;">
      まだ問いが登録されていません。<br>
      管理者が問いを追加するとガチャを引けるようになります。
    </div>
  </div>

  <div class="controls">
    <button id="drawBtn" class="primary">✦ 星を引く</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* =========================
   公開ページ：読み取り専用
   問いは localStorage('quiz_gacha_questions_v1') から読み込む
========================= */
const STORE_Q = 'quiz_gacha_questions_v1';
const STORE_STATS = 'quiz_gacha_stats_v1';

const RARITY_WEIGHT = {common:60, rare:25, epic:12, legend:3};
const RARITY_LABEL = {common:'COMMON', rare:'RARE', epic:'EPIC', legend:'LEGENDARY'};

let stats = (()=>{
  try{ return JSON.parse(localStorage.getItem(STORE_STATS))||{drawCount:0}; }
  catch(e){ return {drawCount:0}; }
})();
function saveStats(){ localStorage.setItem(STORE_STATS, JSON.stringify(stats)); }

function loadQuestions(){
  try{
    const arr = JSON.parse(localStorage.getItem(STORE_Q));
    return Array.isArray(arr) ? arr : [];
  }catch(e){ return []; }
}

function updateStats(){
  document.getElementById('drawCount').textContent = stats.drawCount;
  document.getElementById('totalQ').textContent = loadQuestions().length;
}

/* ===== 背景 ===== */
const bg = document.getElementById('bg'), bctx = bg.getContext('2d');
const fx = document.getElementById('fx'), fctx = fx.getContext('2d');
let W,H,DPR=Math.min(devicePixelRatio||1,2);
let bgStars=[], shootings=[], particles=[], rings=[];

function resize(){
  W=innerWidth;H=innerHeight;
  for(const c of [bg,fx]){c.width=W*DPR;c.height=H*DPR;c.style.width=W+'px';c.style.height=H+'px'}
  bctx.setTransform(DPR,0,0,DPR,0,0);
  fctx.setTransform(DPR,0,0,DPR,0,0);
  bgStars=[];
  const N=Math.min(160,Math.floor(W*H/9000));
  for(let i=0;i<N;i++){
    bgStars.push({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*1.2+0.2,
      a:Math.random()*Math.PI*2, s:Math.random()*0.012+0.003,
      hue:Math.random()<0.15 ? (Math.random()*60+180):null
    });
  }
}
addEventListener('resize',resize); resize();

let lastShoot=0;
function tick(t){
  bctx.clearRect(0,0,W,H);
  for(const s of bgStars){
    s.a+=s.s;
    const o=(Math.sin(s.a)+1)/2*0.7+0.3;
    bctx.beginPath();
    bctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    bctx.fillStyle = s.hue!==null ? `hsla(${s.hue},80%,80%,${o})` : `rgba(255,255,255,${o})`;
    bctx.fill();
  }

  fctx.clearRect(0,0,W,H);
  if(t-lastShoot>5000 && Math.random()<0.25){
    shootings.push({
      x:Math.random()*W*0.5, y:Math.random()*H*0.3,
      vx:6+Math.random()*4, vy:3+Math.random()*2,
      life:0,maxLife:80,trail:[]
    });
    lastShoot=t;
  }
  for(let i=shootings.length-1;i>=0;i--){
    const s=shootings[i];
    s.trail.push({x:s.x,y:s.y});
    if(s.trail.length>15) s.trail.shift();
    s.x+=s.vx;s.y+=s.vy;s.life++;
    s.trail.forEach((p,j)=>{
      const a=(j/s.trail.length)*0.8;
      fctx.beginPath();fctx.arc(p.x,p.y,1.5,0,Math.PI*2);
      fctx.fillStyle=`rgba(255,233,168,${a})`;fctx.fill();
    });
    fctx.beginPath();fctx.arc(s.x,s.y,2.5,0,Math.PI*2);
    fctx.fillStyle='#fff';fctx.shadowColor='#ffe9a8';fctx.shadowBlur=12;fctx.fill();fctx.shadowBlur=0;
    if(s.life>s.maxLife||s.x>W+50||s.y>H+50) shootings.splice(i,1);
  }

  for(let i=rings.length-1;i>=0;i--){
    const r=rings[i];r.life++;
    const p=r.life/r.maxLife;
    fctx.beginPath();fctx.arc(r.x,r.y,10+(r.maxR-10)*p,0,Math.PI*2);
    fctx.strokeStyle=r.color.replace('A',(1-p).toFixed(2));
    fctx.lineWidth=2*(1-p)+0.5;fctx.stroke();
    if(r.life>=r.maxLife) rings.splice(i,1);
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.life++;
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.97;p.vy*=0.97;p.vy+=0.02;
    const a=1-p.life/p.maxLife;
    fctx.beginPath();fctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);
    fctx.fillStyle=p.color;fctx.globalAlpha=a;
    fctx.shadowColor=p.color;fctx.shadowBlur=8;fctx.fill();
    fctx.globalAlpha=1;fctx.shadowBlur=0;
    if(p.life>=p.maxLife) particles.splice(i,1);
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

function burst(x,y,colors,count=40,speed=5){
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2;
    const sp=speed*(0.5+Math.random());
    particles.push({
      x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,
      life:0,maxLife:50+Math.random()*30,
      color:colors[Math.floor(Math.random()*colors.length)],
      size:1.5+Math.random()*2.5
    });
  }
}
function ring(x,y,colorRgb){ rings.push({x,y,r:10,maxR:280,color:`rgba(${colorRgb},A)`,life:0,maxLife:45}); }

/* ===== ガチャ ===== */
function pickRarity(){
  const total=Object.values(RARITY_WEIGHT).reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(const [k,w] of Object.entries(RARITY_WEIGHT)){if(r<w)return k;r-=w}
  return 'common';
}
function drawQuestion(){
  const qs=loadQuestions();
  if(qs.length===0) return null;
  const target=pickRarity();
  let pool=qs.filter(q=>q.rarity===target);
  if(pool.length===0) pool=qs;
  return pool[Math.floor(Math.random()*pool.length)];
}

let drawing=false;
async function performDraw(){
  if(drawing) return;
  const qs=loadQuestions();
  if(qs.length===0){
    document.getElementById('emptyMsg').style.display='block';
    showToast('まだ問いがありません');
    return;
  }
  document.getElementById('emptyMsg').style.display='none';

  const picked=drawQuestion();
  if(!picked) return;

  drawing=true;
  const orb=document.getElementById('orbWrap');
  const card=document.getElementById('card');
  card.classList.remove('show','r-common','r-rare','r-epic','r-legend');
  document.getElementById('hint').style.opacity=0;

  const rect=orb.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;

  // 吸い込み
  for(let i=0;i<20;i++){
    const ang=Math.random()*Math.PI*2;
    const dist=80+Math.random()*60;
    particles.push({
      x:cx+Math.cos(ang)*dist,y:cy+Math.sin(ang)*dist,
      vx:-Math.cos(ang)*2.5,vy:-Math.sin(ang)*2.5,
      life:0,maxLife:30,
      color:['#ffe9a8','#c97aff','#7ab8ff'][i%3],
      size:2
    });
  }
  orb.classList.add('drawing');
  await sleep(900);

  burst(cx,cy,['#ffe9a8','#fff','#c97aff','#7ab8ff','#ffd070'],60,6);
  ring(cx,cy,'255,233,168');
  if(picked.rarity==='epic'||picked.rarity==='legend'){
    ring(cx,cy,'201,122,255');
    flashScreen();
  }
  if(picked.rarity==='legend'){
    setTimeout(()=>ring(cx,cy,'255,208,112'),200);
    flashText('★ LEGENDARY ★','#ffd070');
  }else if(picked.rarity==='epic'){
    flashText('✦ EPIC ✦','#c97aff');
  }else if(picked.rarity==='rare'){
    flashText('◆ RARE ◆','#7ab8ff');
  }

  await sleep(500);

  document.getElementById('badge').textContent=RARITY_LABEL[picked.rarity];
  document.getElementById('badge').className='badge b-'+picked.rarity;
  document.getElementById('cat').textContent=picked.category||'';
  document.getElementById('qtext').textContent='「'+picked.text+'」';
  card.classList.add('show','r-'+picked.rarity);

  setTimeout(()=>orb.classList.remove('drawing'),1100);

  stats.drawCount++; saveStats(); updateStats();
  drawing=false;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function flashScreen(){
  const f=document.getElementById('screenFlash');
  f.classList.remove('show');void f.offsetWidth;f.classList.add('show');
}
function flashText(t,c){
  const f=document.getElementById('flashText');
  f.textContent=t;f.style.color=c;f.style.textShadow=`0 0 30px ${c},0 0 60px ${c}`;
  f.classList.remove('show');void f.offsetWidth;f.classList.add('show');
}
function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

document.getElementById('drawBtn').onclick=performDraw;
document.getElementById('orbWrap').onclick=performDraw;

let lastHover=0;
document.getElementById('orbWrap').addEventListener('mousemove',e=>{
  const now=performance.now();
  if(now-lastHover<80) return;
  lastHover=now;
  particles.push({
    x:e.clientX,y:e.clientY,vx:(Math.random()-0.5)*0.8,vy:(Math.random()-0.5)*0.8,
    life:0,maxLife:30,
    color:['#ffe9a8','#c97aff','#7ab8ff'][Math.floor(Math.random()*3)],
    size:1.5
  });
});

updateStats();
if(loadQuestions().length===0){
  document.getElementById('emptyMsg').style.display='block';
}

// 起動演出
setTimeout(()=>{
  flashText('✦ 宇 宙 が 開 く ✦','#ffe9a8');
  shootings.push({x:0,y:H*0.2,vx:8,vy:4,life:0,maxLife:80,trail:[]});
},400);
</script>
</body>
</html>
