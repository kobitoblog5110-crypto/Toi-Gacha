<!-- File: index.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>✨ 問いガチャ - 宇宙の問い ✨</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { overflow-x:hidden; }
  body {
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    background: #0a0420;
    min-height: 100vh; display:flex; justify-content:center; align-items:center;
    user-select:none; padding:20px 10px;
    position:relative; color:#fff;
  }

  /* === 宇宙背景 === */
  .universe {
    position:fixed; inset:0; z-index:0;
    background: 
      radial-gradient(ellipse at 20% 30%, rgba(120,60,200,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(60,120,200,0.35) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(200,80,180,0.2) 0%, transparent 60%),
      linear-gradient(180deg, #0a0420 0%, #1a0838 50%, #0a0420 100%);
  }
  /* 星々 */
  .star-bg {
    position:absolute; width:2px; height:2px;
    background:#fff; border-radius:50%;
    box-shadow: 0 0 6px #fff, 0 0 12px rgba(255,255,255,0.5);
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity:0.3; transform:scale(0.8); }
    50% { opacity:1; transform:scale(1.3); }
  }
  /* 流れ星 */
  .shooting-star {
    position:absolute; width:120px; height:1px;
    background: linear-gradient(90deg, transparent, #fff, transparent);
    animation: shoot 4s ease-out infinite;
    opacity:0;
  }
  @keyframes shoot {
    0% { transform: translate(-200px, 0) rotate(20deg); opacity:0; }
    10% { opacity:1; }
    100% { transform: translate(100vw, 50vh) rotate(20deg); opacity:0; }
  }

  /* === メインコンテンツ === */
  .container { 
    text-align:center; z-index:2; position:relative; 
    max-width: 480px; width: 100%;
  }

  .crown {
    font-size:2em; margin-bottom:5px;
    filter: drop-shadow(0 0 15px rgba(255,215,100,0.8));
    animation: floatCrown 4s ease-in-out infinite;
  }
  @keyframes floatCrown {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(-8px); }
  }

  h1 {
    font-size:2.6em; margin-bottom:8px;
    background: linear-gradient(135deg, #fff5b8 0%, #ffd700 30%, #ff9ed8 60%, #b8a8ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing:0.15em;
    font-weight: 300;
    text-shadow: 0 0 40px rgba(255,200,255,0.3);
    filter: drop-shadow(0 0 20px rgba(255,180,220,0.4));
  }
  h1 span { font-weight: 600; }

  .subtitle { 
    color:#d8c8ff; margin-bottom:35px; font-size:0.9em;
    letter-spacing:0.3em;
    opacity:0.8;
  }
  .subtitle::before, .subtitle::after { content:'✦ '; color:#ffd700; }
  .subtitle::after { content:' ✦'; }

  /* === 装置：星のオルゴール === */
  .device-wrapper {
    position:relative;
    width:320px; margin:0 auto;
    perspective: 1000px;
  }

  /* オーラ */
  .aura {
    position:absolute; inset:-40px;
    background: radial-gradient(circle, 
      rgba(255,200,255,0.3) 0%, 
      rgba(180,150,255,0.15) 30%, 
      transparent 70%);
    border-radius:50%;
    animation: pulseAura 3s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes pulseAura {
    0%,100% { transform:scale(1); opacity:0.6; }
    50% { transform:scale(1.15); opacity:1; }
  }
  .aura.intense { 
    animation: pulseAura 0.4s ease-in-out infinite;
    background: radial-gradient(circle, 
      rgba(255,180,220,0.6) 0%, 
      rgba(200,150,255,0.4) 30%, 
      transparent 70%);
  }

  /* 上部：水晶球（星が舞う球体） */
  .orb {
    width:280px; height:280px; margin:0 auto;
    position:relative;
    border-radius:50%;
    background: 
      radial-gradient(circle at 30% 25%, rgba(255,255,255,0.4) 0%, transparent 30%),
      radial-gradient(circle at 70% 70%, rgba(150,100,200,0.4) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(40,20,80,0.95) 0%, rgba(20,10,50,0.95) 60%, rgba(10,5,30,0.98) 100%);
    box-shadow: 
      inset -20px -30px 60px rgba(0,0,0,0.6),
      inset 20px 20px 40px rgba(255,200,255,0.15),
      0 0 60px rgba(180,120,255,0.4),
      0 0 120px rgba(150,100,255,0.2);
    overflow:hidden;
    cursor:grab;
    transition: box-shadow 0.5s;
  }
  .orb:active { cursor:grabbing; }
  .orb.glowing {
    box-shadow: 
      inset -20px -30px 60px rgba(0,0,0,0.4),
      inset 20px 20px 40px rgba(255,200,255,0.3),
      0 0 100px rgba(255,180,220,0.8),
      0 0 200px rgba(200,150,255,0.5);
  }

  /* 球の表面ハイライト */
  .orb::before {
    content:''; position:absolute;
    top:15px; left:40px; width:80px; height:60px;
    background: radial-gradient(ellipse, rgba(255,255,255,0.5), transparent 70%);
    border-radius:50%;
    filter: blur(3px);
    pointer-events:none;
    z-index:5;
  }

  /* 球体内部の星々 */
  .inner-star {
    position:absolute;
    width:4px; height:4px;
    background:#fff;
    border-radius:50%;
    box-shadow: 0 0 8px #fff, 0 0 16px currentColor;
    animation: orbitStar var(--dur, 8s) linear infinite;
  }
  .inner-star.s1 { color:#ffd700; }
  .inner-star.s2 { color:#ff9ed8; }
  .inner-star.s3 { color:#b8a8ff; }
  .inner-star.s4 { color:#a8e6f5; }
  .inner-star.s5 { color:#fff5b8; }
  @keyframes orbitStar {
    0% { transform: rotate(0) translateX(var(--r, 80px)) rotate(0); }
    100% { transform: rotate(360deg) translateX(var(--r, 80px)) rotate(-360deg); }
  }
  .orb.spinning .inner-star { animation-duration: 0.8s; }

  /* 球の中心の輝き */
  .core {
    position:absolute; top:50%; left:50%;
    width:30px; height:30px;
    background: radial-gradient(circle, #fff 0%, #ffd700 30%, transparent 70%);
    border-radius:50%;
    transform: translate(-50%,-50%);
    filter: blur(2px);
    animation: corePulse 2s ease-in-out infinite;
  }
  @keyframes corePulse {
    0%,100% { opacity:0.6; transform: translate(-50%,-50%) scale(1); }
    50% { opacity:1; transform: translate(-50%,-50%) scale(1.4); }
  }

  /* 中央：装飾リング */
  .ring-section {
    position:relative;
    width:300px; margin:-30px auto 0;
    z-index:2;
  }
  .ornate-ring {
    width:100%; height:50px;
    background: 
      linear-gradient(180deg, 
        #ffd700 0%, 
        #b8860b 30%, 
        #8b6508 50%,
        #b8860b 70%,
        #ffd700 100%);
    border-radius: 8px;
    position:relative;
    box-shadow: 
      inset 0 2px 4px rgba(255,255,255,0.6),
      inset 0 -3px 6px rgba(0,0,0,0.4),
      0 5px 20px rgba(255,180,100,0.4);
  }
  /* 装飾の星 */
  .ring-stars {
    position:absolute; inset:0;
    display:flex; justify-content:space-around; align-items:center;
    padding: 0 20px;
  }
  .ring-stars span {
    color: #4a2800;
    font-size: 1.1em;
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
  }

  /* 下部：木製スタンド＋表示窓 */
  .stand {
    width:300px; margin:0 auto;
    background: 
      repeating-linear-gradient(90deg, 
        transparent 0px, 
        rgba(60, 30, 10, 0.4) 1px, 
        transparent 3px,
        transparent 15px),
      linear-gradient(180deg, 
        #4a2818 0%, 
        #2d1808 50%,
        #1a0d04 100%);
    padding: 25px 20px 30px;
    border-radius: 0 0 12px 12px;
    box-shadow: 
      inset 0 3px 6px rgba(255,180,120,0.15),
      inset 0 -8px 20px rgba(0,0,0,0.6),
      0 15px 40px rgba(0,0,0,0.6);
    position:relative;
  }
  /* スタンドの金縁 */
  .stand::before {
    content:''; position:absolute;
    top:0; left:10px; right:10px;
    height:3px;
    background: linear-gradient(90deg, transparent, #ffd700 20%, #ffd700 80%, transparent);
    border-radius:2px;
  }

  /* 表示窓 */
  .window-frame {
    background: linear-gradient(135deg, #ffd700, #b8860b);
    padding:4px;
    border-radius:10px;
    box-shadow: 
      inset 0 2px 3px rgba(255,255,255,0.5),
      0 3px 8px rgba(0,0,0,0.5);
  }
  .window {
    width:100%; height:90px;
    background: 
      radial-gradient(ellipse at center, rgba(80,40,150,0.4) 0%, rgba(20,10,50,0.95) 70%);
    border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; position:relative;
    box-shadow: inset 0 5px 15px rgba(0,0,0,0.8);
  }
  .window-text {
    color:#ffd700; font-size:1em; font-weight:bold;
    text-align:center; padding:5px;
    text-shadow: 0 0 10px rgba(255,215,0,0.8), 0 0 20px rgba(255,215,0,0.4);
    letter-spacing:0.1em;
    z-index:2;
  }

  /* 落ちてくる星 */
  .star-drop {
    position:absolute;
    width:50px; height:50px;
    top:-60px; left:50%;
    transform:translateX(-50%);
    opacity:0;
    z-index:3;
  }
  .star-drop svg { width:100%; height:100%; filter: drop-shadow(0 0 12px currentColor); }
  .star-drop.drop {
    animation: starFall 1.6s cubic-bezier(0.4, 0, 0.6, 1) forwards;
  }
  @keyframes starFall {
    0% { top:-60px; opacity:0; transform:translateX(-50%) rotate(0) scale(0.5); }
    15% { opacity:1; }
    50% { top:20px; transform:translateX(-50%) rotate(360deg) scale(1.2); }
    75% { top:45px; transform:translateX(-50%) rotate(540deg) scale(1); }
    85% { top:35px; transform:translateX(-50%) rotate(620deg) scale(1.1); }
    100% { top:40px; opacity:1; transform:translateX(-50%) rotate(720deg) scale(1); }
  }

  /* 操作ヒント */
  .tap-hint {
    margin-top:25px;
    color: #ffd8f0;
    font-size:1em;
    letter-spacing:0.2em;
  }
  .tap-hint .pulse {
    display:inline-block;
    animation: hintPulse 1.5s ease-in-out infinite;
  }
  @keyframes hintPulse {
    0%,100% { opacity:0.5; transform:scale(1); }
    50% { opacity:1; transform:scale(1.1); }
  }

  /* 装置全体の振動 */
  .device-wrapper.shaking { animation: deviceShake 0.1s ease-in-out infinite; }
  @keyframes deviceShake {
    0%,100% { transform:translate(0,0) rotate(0); }
    25% { transform:translate(-3px,-1px) rotate(-0.5deg); }
    75% { transform:translate(3px,1px) rotate(0.5deg); }
  }

  /* === モーダル === */
  .modal {
    position:fixed; inset:0;
    background: radial-gradient(circle at center, rgba(20,10,50,0.85) 0%, rgba(5,2,15,0.95) 100%);
    display:none; justify-content:center; align-items:center; z-index:300;
    padding:20px; backdrop-filter: blur(10px);
  }
  .modal.show { display:flex; animation: fadeIn 0.5s; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .modal-content {
    background: 
      radial-gradient(circle at top, rgba(80,40,150,0.3), transparent 60%),
      linear-gradient(135deg, rgba(30,15,60,0.95) 0%, rgba(15,8,40,0.95) 100%);
    padding: 50px 30px 35px;
    border-radius: 25px;
    max-width: 440px; width:100%;
    text-align:center;
    border: 2px solid transparent;
    background-clip: padding-box;
    position:relative;
    animation: scrollIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 
      0 0 60px rgba(180,120,255,0.5),
      0 0 120px rgba(255,180,220,0.3),
      inset 0 0 40px rgba(255,200,255,0.05);
  }
  @keyframes scrollIn {
    0% { transform:scale(0.5) rotate(-5deg); opacity:0; filter:blur(10px); }
    100% { transform:scale(1) rotate(0); opacity:1; filter:blur(0); }
  }

  /* モーダルの金枠 */
  .modal-content::before {
    content:''; position:absolute;
    inset: -2px;
    background: linear-gradient(135deg, #ffd700, #ff9ed8, #b8a8ff, #ffd700);
    border-radius:25px;
    z-index:-1;
    background-size: 300% 300%;
    animation: gradientShift 4s ease infinite;
  }
  @keyframes gradientShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .modal-crown {
    position:absolute; top:-30px; left:50%;
    transform:translateX(-50%);
    font-size:3em;
    filter: drop-shadow(0 0 15px rgba(255,215,0,0.8));
    animation: crownFloat 2s ease-in-out infinite;
  }
  @keyframes crownFloat {
    0%,100% { transform:translateX(-50%) translateY(0) rotate(-3deg); }
    50% { transform:translateX(-50%) translateY(-6px) rotate(3deg); }
  }

  .question-label {
    color: #ffd700; 
    font-size:0.85em; 
    margin-bottom: 22px;
    letter-spacing:0.4em;
    text-shadow: 0 0 10px rgba(255,215,0,0.5);
  }
  .question-label::before, .question-label::after { 
    content:'✦'; 
    margin: 0 12px; 
    color:#ff9ed8;
  }

  .question-text {
    font-size:1.4em; 
    color:#fff; 
    line-height:1.8;
    margin-bottom:30px; 
    font-weight:500;
    padding:25px 18px;
    background: 
      radial-gradient(circle at center, rgba(255,200,255,0.08) 0%, transparent 70%),
      rgba(255,255,255,0.04);
    border-radius:15px;
    border: 1px solid rgba(255,215,0,0.3);
    text-shadow: 0 0 15px rgba(255,200,255,0.3);
    letter-spacing:0.05em;
  }

  .btn-group { display:flex; gap:12px; flex-direction:column; }
  .btn {
    padding:16px 22px;
    border:none; 
    border-radius:30px;
    font-size:1em; 
    font-weight:bold; 
    cursor:pointer;
    transition:all 0.3s;
    font-family:inherit;
    letter-spacing:0.1em;
    position:relative;
    overflow:hidden;
  }
  .btn::before {
    content:''; position:absolute;
    inset:0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }
  .btn:hover::before { transform: translateX(100%); }
  .btn:hover { transform:translateY(-3px); }
  .btn:active { transform:translateY(0); }

  .btn-primary {
    background: linear-gradient(135deg, #ffd700 0%, #ff9ed8 50%, #b8a8ff 100%);
    color:#2a0040;
    box-shadow: 
      0 5px 20px rgba(255,180,220,0.5),
      0 0 30px rgba(255,215,0,0.3);
    text-shadow: 0 1px 0 rgba(255,255,255,0.5);
  }
  .btn-primary:hover {
    box-shadow: 
      0 8px 30px rgba(255,180,220,0.7),
      0 0 40px rgba(255,215,0,0.5);
  }

  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color:#fff;
    border:1px solid rgba(255,215,0,0.4);
    backdrop-filter: blur(5px);
  }
  .btn-secondary:hover { 
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,215,0,0.7);
  }

  /* 紙吹雪/星 */
  .sparkle {
    position:fixed; pointer-events:none; z-index:250;
    font-size:1.8em;
  }

  @media (max-width:380px) {
    .device-wrapper { width:280px; }
    .orb { width:240px; height:240px; }
    .ring-section { width:260px; }
    .stand { width:260px; }
    h1 { font-size:2em; }
  }
</style>
</head>
<body>
  <div class="universe" id="universe"></div>

  <div class="container">
    <div class="crown">👑</div>
    <h1>問い<span>ガチャ</span></h1>
    <p class="subtitle">星 か ら 授 か る 、 答 え の な い 問 い</p>

    <div class="device-wrapper" id="device">
      <div class="aura" id="aura"></div>

      <!-- 水晶球 -->
      <div class="orb" id="orb">
        <div class="core"></div>
        <!-- 内部の星はJSで生成 -->
      </div>

      <!-- 金リング -->
      <div class="ring-section">
        <div class="ornate-ring">
          <div class="ring-stars">
            <span>✦</span><span>✧</span><span>✦</span><span>✧</span>
            <span>✦</span><span>✧</span><span>✦</span>
          </div>
        </div>
      </div>

      <!-- スタンド＋表示窓 -->
      <div class="stand">
        <div class="window-frame">
          <div class="window">
            <div class="window-text" id="windowText">
              ✦ 球に触れて願いを ✦
            </div>
            <div class="star-drop" id="starDrop">
              <svg viewBox="0 0 50 50">
                <polygon points="25,2 31,18 48,19 34,30 39,47 25,38 11,47 16,30 2,19 19,18" 
                  fill="currentColor" stroke="#fff" stroke-width="1"/>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>

    <p class="tap-hint">
      <span class="pulse">✦</span> 水 晶 球 を タ ッ プ <span class="pulse">✦</span>
    </p>
  </div>

  <!-- モーダル -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-crown">✨</div>
      <div class="question-label">星 か ら の 問 い</div>
      <div class="question-text" id="questionText"></div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="spinAgain()">✦ もう一度、星を呼ぶ ✦</button>
        <button class="btn btn-secondary" onclick="backToTitle()">夜空に戻る</button>
      </div>
    </div>
  </div>

<script>
  // === 背景の星々を生成 ===
  const universe = document.getElementById('universe');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star-bg';
    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*100 + '%';
    s.style.setProperty('--dur', (2 + Math.random()*3) + 's');
    s.style.animationDelay = Math.random()*3 + 's';
    if (Math.random() > 0.7) {
      s.style.width = '3px'; s.style.height = '3px';
    }
    universe.appendChild(s);
  }
  // 流れ星
  for (let i = 0; i < 3; i++) {
    const ss = document.createElement('div');
    ss.className = 'shooting-star';
    ss.style.top = (Math.random()*40) + '%';
    ss.style.animationDelay = (i*5 + Math.random()*3) + 's';
    universe.appendChild(ss);
  }

  // === 水晶球内部の星 ===
  const orb = document.getElementById('orb');
  const innerStars = [];
  for (let i = 0; i < 12; i++) {
    const star = document.createElement('div');
    const colors = ['s1','s2','s3','s4','s5'];
    star.className = 'inner-star ' + colors[i % 5];
    const radius = 40 + Math.random()*70;
    const duration = 6 + Math.random()*8;
    star.style.setProperty('--r', radius + 'px');
    star.style.setProperty('--dur', duration + 's');
    star.style.left = '50%';
    star.style.top = '50%';
    star.style.animationDelay = (-Math.random()*duration) + 's';
    orb.appendChild(star);
    innerStars.push(star);
  }

  // === 問い ===
  const DEFAULT_QUESTIONS = [
    "もし明日世界が終わるなら、最後に誰と何を話したい？",
    "あなたにとって「自由」とは何ですか？",
    "10年前の自分に一言だけ伝えられるとしたら？",
    "幸せの定義を、自分の言葉で言うと？",
    "失敗から学んだ最大のことは何ですか？"
  ];
  function getQuestions() {
    const stored = localStorage.getItem('toiGachaQuestions');
    if (stored) {
      const arr = JSON.parse(stored);
      if (arr.length > 0) return arr;
    }
    return DEFAULT_QUESTIONS;
  }

  // === 要素 ===
  const device = document.getElementById('device');
  const aura = document.getElementById('aura');
  const windowText = document.getElementById('windowText');
  const starDrop = document.getElementById('starDrop');
  const modal = document.getElementById('modal');
  const questionText = document.getElementById('questionText');

  let isSpinning = false;
  let tapCount = 0;

  // === 効果音 ===
  let audioCtx;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  // タップ時のキラキラ音
  function playChime() {
    if (!audioCtx) return;
    const freqs = [1318.51, 1567.98, 1975.53];
    freqs.forEach((f, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = f; o.type = 'sine';
      const t = audioCtx.currentTime + i * 0.04;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.08, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.start(t); o.stop(t + 0.4);
    });
  }
  // 星が落ちる音
  function playStarFall() {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.setValueAtTime(2000, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.6);
    o.type = 'sine';
    g.gain.setValueAtTime(0.15, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
    o.start(); o.stop(audioCtx.currentTime + 0.6);
  }
  // ファンファーレ（神秘的）
  function playFanfare() {
    if (!audioCtx) return;
    const notes = [
      [523.25, 0],     // C
      [659.25, 0.1],   // E
      [783.99, 0.2],   // G
      [1046.50, 0.3],  // C
      [1318.51, 0.45], // E
    ];
    notes.forEach(([freq, delay]) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      o.connect(filter); filter.connect(g); g.connect(audioCtx.destination);
      filter.type = 'lowpass';
      filter.frequency.value = 3000;
      o.frequency.value = freq; o.type = 'triangle';
      const t = audioCtx.currentTime + delay;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.18, t + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      o.start(t); o.stop(t + 0.8);
    });
  }

  // === タップで起動 ===
  function activateOrb(e) {
    if (isSpinning) return;
    initAudio();
    
    tapCount++;
    playChime();

    // タップ時の波紋効果
    createRipple(e);

    // タップで段階的に光が強くなる
    if (tapCount === 1) {
      orb.classList.add('glowing');
      windowText.innerHTML = '✦ 星 が 共 鳴 し て い る ✦';
    } else if (tapCount === 2) {
      windowText.innerHTML = '✦ も う 少 し … ✦';
    } else if (tapCount >= 3) {
      tapCount = 0;
      triggerGacha();
    }
    e.preventDefault();
  }

  function createRipple(e) {
    const rect = orb.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    const ripple = document.createElement('div');
    ripple.style.cssText = `
      position:absolute; left:${x}px; top:${y}px;
      width:10px; height:10px; border-radius:50%;
      background:radial-gradient(circle, rgba(255,215,0,0.8), transparent);
      transform:translate(-50%,-50%);
      pointer-events:none; z-index:10;
    `;
    orb.appendChild(ripple);
    ripple.animate([
      { width:'10px', height:'10px', opacity:1 },
      { width:'250px', height:'250px', opacity:0 }
    ], { duration:800, easing:'ease-out' });
    setTimeout(()=>ripple.remove(), 800);
  }

  // === ガチャ起動 ===
  function triggerGacha() {
    if (isSpinning) return;
    isSpinning = true;

    device.classList.add('shaking');
    orb.classList.add('spinning', 'glowing');
    aura.classList.add('intense');
    windowText.innerHTML = '✨ 星 が 集 ま っ て い る ✨';

    // チャイム連続
    let chimeInterval = setInterval(playChime, 250);

    setTimeout(() => {
      clearInterval(chimeInterval);
      device.classList.remove('shaking');
      orb.classList.remove('spinning');
      windowText.innerHTML = '';

      // 星カラーをランダム選択
      const starColors = ['#ffd700', '#ff9ed8', '#b8a8ff', '#a8e6f5', '#fff5b8'];
      starDrop.style.color = starColors[Math.floor(Math.random()*starColors.length)];
      starDrop.classList.remove('drop');
      void starDrop.offsetWidth;
      starDrop.classList.add('drop');
      
      setTimeout(playStarFall, 200);

      // 結果表示
      setTimeout(() => {
        playFanfare();
        showStarBurst();
        const questions = getQuestions();
        const picked = questions[Math.floor(Math.random() * questions.length)];
        questionText.textContent = picked;
        modal.classList.add('show');
        
        setTimeout(() => {
          starDrop.classList.remove('drop');
          windowText.innerHTML = '✦ 球 に 触 れ て 願 い を ✦';
          orb.classList.remove('glowing');
          aura.classList.remove('intense');
          isSpinning = false;
        }, 600);
      }, 1700);
    }, 1800);
  }

  // 星の爆発演出
  function showStarBurst() {
    const symbols = ['✦','✧','⭐','✨','🌟','💫','★','☆','✩','🌠'];
    for (let i = 0; i < 50; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = symbols[Math.floor(Math.random()*symbols.length)];
      const colors = ['#ffd700', '#ff9ed8', '#b8a8ff', '#a8e6f5', '#fff5b8', '#fff'];
      s.style.color = colors[Math.floor(Math.random()*colors.length)];
      s.style.left = '50vw';
      s.style.top = '50vh';
      s.style.textShadow = '0 0 10px currentColor, 0 0 20px currentColor';
      document.body.appendChild(s);
      
      const angle = (i / 50) * Math.PI * 2 + Math.random()*0.3;
      const dist = 200 + Math.random()*500;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;
      
      s.animate([
        { transform:'translate(0,0) scale(0) rotate(0)', opacity:1 },
        { transform:`translate(${dx}px,${dy}px) scale(${1 + Math.random()}) rotate(${Math.random()*720}deg)`, opacity:0 }
      ], { duration:1500 + Math.random()*800, easing:'cubic-bezier(0.2, 0.8, 0.4, 1)' });
      setTimeout(()=>s.remove(), 2300);
    }
  }

  function spinAgain() { 
    modal.classList.remove('show');
    // すぐにまた引きたくなる演出（軽いキラキラ）
    setTimeout(()=>{
      windowText.innerHTML = '✦ ま た 星 が 待 っ て い る ✦';
      setTimeout(()=>{
        windowText.innerHTML = '✦ 球 に 触 れ て 願 い を ✦';
      }, 1500);
    }, 300);
  }
  function backToTitle() { 
    modal.classList.remove('show');
    window.scrollTo({top:0, behavior:'smooth'});
  }

  // イベント登録
  orb.addEventListener('click', activateOrb);
  orb.addEventListener('touchstart', activateOrb, {passive:false});
</script>
</body>
