<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>🌌 星詠みの問いガチャ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; min-height: 100%;
    font-family: "Hiragino Mincho ProN","Yu Mincho",serif;
    color: #fff; user-select: none;
    background: linear-gradient(160deg,#1a0533 0%,#2d1b5e 50%,#0a1a4a 100%);
    overflow-x: hidden;
  }
  /* 星空 */
  .sky { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star {
    position: absolute; width: 2px; height: 2px; background: #fff;
    border-radius: 50%; box-shadow: 0 0 6px #fff;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.3; transform: scale(1); }
    50%     { opacity: 1;   transform: scale(1.4); }
  }
  .shooting-star {
    position: absolute; width: 2px; height: 2px; background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 8px #fff, -40px 0 20px 2px rgba(255,255,255,0.6);
    animation: shoot 4s linear infinite;
  }
  @keyframes shoot {
    0%   { transform: translate(-100px,0) rotate(20deg); opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translate(120vw,40vh) rotate(20deg); opacity: 0; }
  }

  /* HUD */
  .hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 5;
    display: flex; justify-content: space-between;
    padding: 12px 16px;
    background: linear-gradient(180deg,rgba(10,5,30,0.7),transparent);
    backdrop-filter: blur(4px);
  }
  .hud-item {
    font-size: 11px; letter-spacing: 0.1em;
    color: #ffd9a8;
    display: flex; align-items: center; gap: 6px;
  }
  .hud-item .num {
    font-size: 16px; font-weight: bold; color: #ffd700;
    text-shadow: 0 0 8px rgba(255,215,0,0.6);
  }
  .combo-badge {
    background: linear-gradient(135deg,#ff6b9d,#ffd700);
    color: #1a0533;
    padding: 4px 10px; border-radius: 20px;
    font-weight: bold; font-size: 12px;
    animation: comboShake 0.5s ease;
  }
  @keyframes comboShake {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.15); }
  }

  .stage {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 70px 20px 40px;
  }
  h1 {
    font-size: clamp(20px,4vw,32px);
    letter-spacing: 0.3em;
    margin-bottom: 8px;
    background: linear-gradient(90deg,#ffd9a8,#ffb1e8,#a89bff,#ffd9a8);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 6s linear infinite;
    text-align: center;
  }
  @keyframes shimmer { to { background-position: 300% 0; } }
  .subtitle {
    font-size: 12px; opacity: 0.7; letter-spacing: 0.2em;
    margin-bottom: 24px; text-align: center;
  }

  .device { position: relative; }
  .orb-wrapper {
    position: relative; width: 260px; height: 260px;
    margin: 0 auto;
  }
  .ring-deco {
    position: absolute; inset: -10px;
    border-radius: 50%;
    background: conic-gradient(from 0deg,#ffd700,#fff4b8,#d4a017,#ffe98a,#b8860b,#ffd700,#fff4b8,#ffd700);
    animation: rotate 8s linear infinite;
    opacity: 0.85; filter: blur(1px);
  }
  .ring-deco::before {
    content: ""; position: absolute; inset: 8px;
    border-radius: 50%;
    background: radial-gradient(circle,#1a0533 60%,transparent);
  }
  @keyframes rotate { to { transform: rotate(360deg); } }

  .orb {
    position: absolute; inset: 12px;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 30%, rgba(255,255,255,0.4), transparent 50%),
      radial-gradient(circle at 65% 70%, rgba(180,140,255,0.3), transparent 60%),
      radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(60,30,120,0.6) 70%, rgba(20,10,50,0.9) 100%);
    box-shadow:
      inset 0 0 60px rgba(255,255,255,0.3),
      0 0 80px rgba(180,120,255,0.5),
      0 0 30px rgba(255,215,0,0.3);
    overflow: hidden; cursor: pointer;
    transition: transform 0.2s ease;
  }
  .orb:active { transform: scale(0.97); }
  .orb.charging { animation: pulse 0.6s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: inset 0 0 60px rgba(255,255,255,0.3), 0 0 80px rgba(180,120,255,0.5); }
    50%     { box-shadow: inset 0 0 80px rgba(255,255,255,0.6), 0 0 120px rgba(255,215,0,0.8); }
  }
  .inner-star {
    position: absolute; top: 50%; left: 50%;
    width: 8px; height: 8px;
    border-radius: 50%; transform-origin: 0 0;
  }
  .core {
    position: absolute; top: 50%; left: 50%;
    width: 24px; height: 24px;
    margin: -12px 0 0 -12px;
    border-radius: 50%;
    background: radial-gradient(circle,#fff8c4,#ffd700,#b8860b);
    box-shadow: 0 0 30px #ffd700, 0 0 60px rgba(255,215,0,0.6);
    animation: heartbeat 1.6s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    50%     { transform: scale(1.25); }
  }
  .ripple {
    position: absolute; border-radius: 50%;
    border: 2px solid #ffd700;
    pointer-events: none;
    animation: ripple-out 0.8s ease-out forwards;
  }
  @keyframes ripple-out {
    0%   { width: 0; height: 0; opacity: 1; }
    100% { width: 200px; height: 200px; opacity: 0; }
  }
  .stand {
    position: relative;
    width: 280px; height: 90px;
    margin: -10px auto 0;
    background: linear-gradient(180deg,#5a3820,#3a2210);
    border-radius: 8px 8px 16px 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,200,150,0.2);
    border: 2px solid #ffd700;
  }
  .display {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    width: 70%; height: 54px;
    background: radial-gradient(circle,#1a0533,#000);
    border: 2px solid #ffd700;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
  }
  .display-text {
    font-size: 12px; letter-spacing: 0.15em;
    color: #ffd9a8; opacity: 0.8; text-align: center;
  }
  .falling-star {
    position: absolute; top: -40px; left: 50%;
    transform: translateX(-50%);
    font-size: 30px; opacity: 0;
  }
  .falling-star.active {
    animation: fallStar 1.2s cubic-bezier(.5,.05,.5,.95) forwards;
  }
  @keyframes fallStar {
    0%   { top: -40px; opacity: 0; transform: translateX(-50%) rotate(0deg) scale(0.5); }
    30%  { opacity: 1; }
    100% { top: 30px; opacity: 1; transform: translateX(-50%) rotate(720deg) scale(1); }
  }
  .handle {
    position: absolute; right: -28px; top: 22px;
    width: 46px; height: 46px;
    background: radial-gradient(circle at 30% 30%,#ffe98a,#b8860b);
    border-radius: 50%;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    transition: transform 0.4s ease;
  }
  .status {
    margin-top: 24px;
    font-size: 15px; letter-spacing: 0.15em;
    text-align: center;
    min-height: 22px;
    color: #ffd9a8;
    text-shadow: 0 0 10px rgba(255,217,168,0.5);
  }
  .tap-counter {
    display: flex; gap: 12px; justify-content: center; margin-top: 10px;
  }
  .tap-dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid #ffd700;
    background: transparent;
    transition: all 0.3s ease;
  }
  .tap-dot.active {
    background: #ffd700;
    box-shadow: 0 0 12px #ffd700;
  }
  .nav {
    margin-top: 30px;
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  }
  .nav-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,215,0,0.4);
    color: #ffd9a8;
    padding: 10px 16px;
    border-radius: 24px;
    font-size: 12px; letter-spacing: 0.1em;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .nav-btn:hover {
    background: rgba(255,215,0,0.15);
    transform: translateY(-1px);
  }

  /* ========== 結果モーダル（刷新） ========== */
  .modal-bg {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,5,30,0.85);
    display: none; align-items: center; justify-content: center;
    padding: 20px;
    backdrop-filter: blur(8px);
    overflow-y: auto;
  }
  .modal-bg.show { display: flex; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* 結果モーダル：問いを最大化 */
  .result-modal {
    position: relative;
    max-width: 580px; width: 100%;
    margin: auto;
  }
  .result-card {
    position: relative;
    padding: 6px;
    border-radius: 24px;
    background: linear-gradient(45deg,#ffd700,#ff9ed4,#a89bff,#ffd700);
    background-size: 300% 300%;
    animation: borderFlow 4s ease infinite;
    box-shadow: 0 0 80px rgba(255,215,0,0.4);
  }
  @keyframes borderFlow {
    0%,100% { background-position: 0% 50%; }
    50%     { background-position: 100% 50%; }
  }
  .result-inner {
    position: relative;
    background: linear-gradient(160deg,#1a0533,#2d1b5e,#1a0533);
    border-radius: 20px;
    padding: 50px 30px 30px;
    text-align: center;
    overflow: hidden;
  }
  /* カード内の装飾星 */
  .deco-star {
    position: absolute;
    color: #ffd700;
    opacity: 0.5;
    pointer-events: none;
    animation: decoFloat 4s ease-in-out infinite;
  }
  @keyframes decoFloat {
    0%,100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
    50%     { transform: translateY(-8px) rotate(180deg); opacity: 0.8; }
  }
  .result-label {
    font-size: 11px; letter-spacing: 0.5em;
    color: #ffd700;
    margin-bottom: 8px;
    text-shadow: 0 0 10px rgba(255,215,0,0.6);
  }
  .result-label::before, .result-label::after {
    content: '✦';
    margin: 0 8px;
  }
  .result-meta-top {
    font-size: 10px;
    color: #ffd9a8;
    opacity: 0.7;
    letter-spacing: 0.15em;
    margin-bottom: 28px;
  }
  .daily-mark {
    display: inline-block;
    background: linear-gradient(135deg,#ffd700,#ff9ed4);
    color: #1a0533;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: bold;
    margin-right: 6px;
    font-family: sans-serif;
  }
  /* 問い本体（強調） */
  .question-area {
    position: relative;
    padding: 30px 16px;
    margin: 16px 0 28px;
  }
  .quote-mark {
    position: absolute;
    font-size: 80px;
    color: rgba(255,215,0,0.25);
    font-family: serif;
    line-height: 1;
  }
  .quote-mark.left { top: -10px; left: 0; }
  .quote-mark.right { bottom: -40px; right: 0; }
  .question-text {
    position: relative;
    font-size: clamp(20px,5.5vw,28px);
    line-height: 2;
    color: #fff;
    font-family: "Yu Mincho","Hiragino Mincho ProN",serif;
    font-weight: 500;
    letter-spacing: 0.08em;
    white-space: pre-wrap;
    text-shadow: 0 0 20px rgba(255,255,255,0.2);
    animation: questionFloat 5s ease-in-out infinite;
  }
  @keyframes questionFloat {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-4px); }
  }
  .question-text.fading { opacity: 0.3; transition: opacity 0.4s; }

  /* メインアクション */
  .main-actions {
    display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .action-btn {
    padding: 12px 22px;
    background: linear-gradient(135deg,#ffd700,#ff9ed4);
    color: #1a0533;
    border: none; border-radius: 26px;
    font-size: 13px; font-weight: bold;
    letter-spacing: 0.1em;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.2s;
  }
  .action-btn:hover { transform: translateY(-2px); }
  .action-btn.outline {
    background: transparent;
    color: #ffd9a8;
    border: 1px solid rgba(255,215,0,0.5);
  }

  /* サブツール（小さい円ボタン群） */
  .tool-row {
    display: flex; gap: 8px; justify-content: center;
    margin-top: 6px;
    padding-top: 14px;
    border-top: 1px dashed rgba(255,215,0,0.2);
  }
  .tool-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,215,0,0.3);
    color: #ffd9a8;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .tool-btn:hover {
    background: rgba(255,215,0,0.2);
    transform: translateY(-2px);
  }
  .tool-btn.close-btn {
    background: rgba(255,255,255,0.05);
  }

  /* 沈思モード */
  .meditation {
    position: fixed; inset: 0; z-index: 200;
    background: radial-gradient(circle,rgba(20,10,50,0.95),rgba(0,0,0,0.98));
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    padding: 30px;
    backdrop-filter: blur(20px);
  }
  .meditation.show { display: flex; animation: fadeIn 0.6s ease; }
  .med-question {
    font-size: clamp(22px,5vw,32px);
    line-height: 2;
    color: #fff;
    text-align: center;
    max-width: 700px;
    font-family: "Yu Mincho",serif;
    text-shadow: 0 0 30px rgba(255,255,255,0.3);
    margin-bottom: 40px;
    animation: questionFloat 5s ease-in-out infinite;
  }
  .med-timer {
    font-size: 64px;
    color: #ffd700;
    font-family: monospace;
    letter-spacing: 0.1em;
    text-shadow: 0 0 20px rgba(255,215,0,0.6);
    margin-bottom: 30px;
  }
  .med-progress {
    width: 200px; height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 30px;
  }
  .med-progress-bar {
    height: 100%;
    background: linear-gradient(90deg,#ffd700,#ff9ed4);
    width: 100%;
    transition: width 1s linear;
  }
  .med-hint {
    color: #ffd9a8;
    font-size: 12px;
    letter-spacing: 0.2em;
    opacity: 0.7;
    margin-bottom: 20px;
  }
  .med-close {
    color: #ffd9a8;
    background: transparent;
    border: 1px solid rgba(255,215,0,0.4);
    padding: 8px 20px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
  }
  /* 沈思モードでタップ時の願いの光 */
  .wish-light {
    position: fixed;
    pointer-events: none;
    z-index: 201;
    font-size: 24px;
    color: #ffd700;
  }

  /* 心の記録モーダル */
  .reflect-modal {
    max-width: 480px; width: 100%;
    background: linear-gradient(160deg,#1a0533,#2d1b5e);
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 16px;
    padding: 24px;
    margin: auto;
  }
  .reflect-q {
    font-size: 16px;
    line-height: 1.7;
    color: #ffd9a8;
    margin-bottom: 16px;
    font-family: "Yu Mincho",serif;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,215,0,0.2);
  }
  .reflect-input {
    width: 100%;
    padding: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 8px;
    color: #fff;
    min-height: 120px;
    resize: vertical;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.7;
  }
  .reflect-input:focus {
    outline: none; border-color: #ffd700;
  }
  .reflect-actions {
    display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end;
  }

  /* 星座盤 */
  .modal {
    position: relative;
    max-width: 540px; width: 100%;
    padding: 6px;
    border-radius: 20px;
    background: linear-gradient(45deg,#ffd700,#ff9ed4,#a89bff,#ffd700);
    background-size: 300% 300%;
    animation: borderFlow 4s ease infinite;
    margin: auto;
  }
  .modal-inner {
    background: linear-gradient(160deg,#1a0533,#2d1b5e);
    border-radius: 16px;
    padding: 28px 22px;
    text-align: center;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal-label {
    font-size: 11px; letter-spacing: 0.4em;
    color: #ffd700; margin-bottom: 16px;
  }
  .modal-btn {
    padding: 10px 20px;
    background: linear-gradient(135deg,#ffd700,#ff9ed4);
    color: #1a0533;
    border: none; border-radius: 24px;
    font-size: 13px; font-weight: bold;
    letter-spacing: 0.1em;
    cursor: pointer;
    font-family: inherit;
  }
  .modal-btn.secondary {
    background: transparent;
    color: #ffd9a8;
    border: 1px solid #ffd9a8;
  }

  .constellation {
    position: relative;
    width: 100%; aspect-ratio: 1.4 / 1;
    background: radial-gradient(ellipse at center,#0a1a4a,#000);
    border-radius: 12px;
    border: 1px solid rgba(255,215,0,0.4);
    margin: 16px 0;
    overflow: hidden;
  }
  .const-star {
    position: absolute;
    width: 16px; height: 16px;
    transform: translate(-50%,-50%);
    cursor: pointer;
    transition: all 0.3s;
  }
  .const-star.lit {
    color: #ffd700;
    text-shadow: 0 0 10px #ffd700, 0 0 20px rgba(255,215,0,0.6);
    animation: starPulse 2s ease-in-out infinite;
  }
  .const-star.unlit { color: rgba(255,255,255,0.15); }
  @keyframes starPulse {
    0%,100% { transform: translate(-50%,-50%) scale(1); }
    50%     { transform: translate(-50%,-50%) scale(1.2); }
  }
  .progress {
    margin: 12px 0;
    background: rgba(255,255,255,0.1);
    border-radius: 20px; overflow: hidden;
    height: 8px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg,#ffd700,#ff9ed4);
    transition: width 0.5s ease;
  }
  .progress-text {
    font-size: 12px;
    color: #ffd9a8;
    margin-top: 4px;
  }

  .history-item {
    background: rgba(255,255,255,0.05);
    padding: 12px 14px;
    border-radius: 8px;
    margin-bottom: 8px;
    text-align: left;
    border-left: 3px solid #ffd700;
    font-size: 13px;
    line-height: 1.6;
  }
  .history-item .when {
    font-size: 10px; opacity: 0.6;
    margin-bottom: 4px;
    letter-spacing: 0.1em;
  }
  .history-item .reflect {
    margin-top: 8px;
    padding: 8px 10px;
    background: rgba(255,215,0,0.08);
    border-radius: 6px;
    font-size: 12px;
    color: #ffd9a8;
    white-space: pre-wrap;
  }
  .history-item.daily {
    border-left-color: #ff9ed4;
    background: linear-gradient(90deg,rgba(255,158,212,0.15),rgba(255,255,255,0.05));
  }
  .history-empty {
    text-align: center; opacity: 0.5;
    padding: 30px; font-size: 12px;
  }

  .titles {
    display: flex; flex-wrap: wrap; gap: 6px;
    justify-content: center;
    margin: 14px 0;
  }
  .title-badge {
    font-size: 11px;
    padding: 4px 10px;
    background: linear-gradient(135deg,rgba(255,215,0,0.2),rgba(255,158,212,0.2));
    border: 1px solid rgba(255,215,0,0.5);
    border-radius: 12px;
    color: #ffd9a8;
    letter-spacing: 0.05em;
  }
  .title-badge.locked {
    opacity: 0.3;
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.2);
  }

  /* コンボ */
  .combo-popup {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    z-index: 250;
    pointer-events: none;
    font-size: 60px; font-weight: bold;
    background: linear-gradient(135deg,#ff6b9d,#ffd700);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 30px rgba(255,215,0,0.8);
    opacity: 0;
    letter-spacing: 0.05em;
  }
  .combo-popup.show { animation: comboShow 1.4s ease-out forwards; }
  @keyframes comboShow {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.3); }
    30%  { opacity: 1; transform: translate(-50%,-50%) scale(1.2); }
    70%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-100%) scale(0.9); }
  }

  .complete-banner {
    position: fixed; inset: 0;
    z-index: 300;
    background: radial-gradient(circle,rgba(255,215,0,0.3),rgba(10,5,30,0.95));
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center;
  }
  .complete-banner.show { display: flex; animation: fadeIn 0.6s ease; }
  .complete-banner h2 {
    font-size: clamp(28px,7vw,48px);
    background: linear-gradient(90deg,#ffd700,#ff9ed4,#ffd700);
    background-size: 200% 100%;
    -webkit-background-clip: text;

    color: transparent;

  .burst-star {

  /* トースト */
  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255,215,0,0.9);
    color: #1a0533;
    padding: 10px 20px;

    z-index: 400;
    opacity: 0;
    transition: opacity 0.3s;

  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="sky" id="sky"></div>

<div class="hud">
  <div class="hud-item">⭐ <span class="num" id="hudCollected">0</span>/<span id="hudTotal">0</span></div>

<div class="stage">

  <div class="device">

<!-- 結果モーダル -->
<div class="modal-bg" id="modalBg">
  <div class="result-modal">
    <div class="result-card">
      <div class="result-inner" id="resultInner">
        <!-- 装飾星 -->
        <span class="deco-star" style="top:10px;left:14px;font-size:14px;">✦</span>
        <span class="deco-star" style="top:20px;right:18px;font-size:10px;animation-delay:1s;">✧</span>
        <span class="deco-star" style="bottom:20px;left:20px;font-size:12px;animation-delay:2s;">✦</span>
        <span class="deco-star" style="bottom:14px;right:14px;font-size:14px;animation-delay:0.5s;">✧</span>

        <div class="result-label">宇宙からの問い</div>

<!-- 沈思モード -->

  <div class="med-question" id="medQuestion">—</div>
  <div class="med-timer" id="medTimer">01:00</div>
  <div class="med-progress"><div class="med-progress-bar" id="medProgressBar"></div></div>
  <div class="med-hint" style="font-size:10px;">画面をタップすると、星に願いを放てます</div>
  <button class="med-close" id="medClose">そっと閉じる</button>
</div>

<!-- 心の記録 -->
<div class="modal-bg" id="reflectBg">
  <div class="reflect-modal">
    <div class="modal-label" style="font-size:11px;letter-spacing:0.3em;color:#ffd700;margin-bottom:14px;">✍️ 心の記録</div>
    <div class="reflect-q" id="reflectQ">—</div>
    <textarea class="reflect-input" id="reflectInput" placeholder="この問いを受け取って、いま心に浮かんだことを..."></textarea>
    <div class="reflect-actions">
      <button class="modal-btn secondary" id="reflectCancel">閉じる</button>
      <button class="modal-btn" id="reflectSave">星に刻む</button>
    </div>

</div>

<!-- 星座盤 -->
<div class="modal-bg" id="constBg">
  <div class="modal">
    <div class="modal-inner">
      <div class="modal-label">⭐ 星座盤 ⭐</div>
      <div class="progress"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
      <div class="progress-text" id="progressText">あと ? 個の星が眠っている</div>
      <div class="constellation" id="constellation"></div>
      <button class="modal-btn secondary" data-close="constBg">閉じる</button>
    </div>
  </div>
</div>

<!-- 履歴 -->
<div class="modal-bg" id="historyBg">
  <div class="modal">
    <div class="modal-inner">
      <div class="modal-label">📜 問いの軌跡 📜</div>
      <div id="historyList" style="margin:16px 0;"></div>
      <button class="modal-btn secondary" data-close="historyBg">閉じる</button>

<!-- 称号 -->
<div class="modal-bg" id="titleBg">
  <div class="modal">
    <div class="modal-inner">
      <div class="modal-label">🏆 称号 🏆</div>
      <div class="titles" id="titlesList"></div>
      <button class="modal-btn secondary" data-close="titleBg">閉じる</button>
    </div>
  </div>
</div>

<div class="combo-popup" id="comboPopup"></div>

<div class="complete-banner" id="completeBanner" onclick="this.classList.remove('show')">
  <h2>✦ 星座、完成 ✦</h2>
  <p>すべての星と出会いました</p>
  <p style="margin-top:20px;font-size:11px;opacity:0.6;">タップで閉じる</p>
</div>

<div class="toast" id="toast">コピーしました</div>

<script>
/* ========== ストレージ ========== */
const KEY_QS = 'cosmic_questions_v1';
const KEY_STATE = 'cosmic_state_v2';

function loadState() {
  try { return JSON.parse(localStorage.getItem(KEY_STATE)) || initState(); }
  catch { return initState(); }
}
function initState() {
  return {
    encountered: {}, history: [], totalPlays: 0,
    bestCombo: 0, lastDaily: null, lastPlayAt: 0,
    currentCombo: 0, meditations: 0
  };
}
function saveState(s) { localStorage.setItem(KEY_STATE, JSON.stringify(s)); }
let state = loadState();
function getQs() {
  try { return JSON.parse(localStorage.getItem(KEY_QS) || '[]'); }
  catch { return []; }
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

/* ========== 星空 ========== */
const sky = document.getElementById('sky');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.top = Math.random() * 100 + '%';
  s.style.left = Math.random() * 100 + '%';
  s.style.animationDelay = Math.random() * 3 + 's';
  s.style.transform = `scale(${0.5 + Math.random() * 1.5})`;
  sky.appendChild(s);
}
for (let i = 0; i < 3; i++) {
  const ss = document.createElement('div');
  ss.className = 'shooting-star';
  ss.style.top = Math.random() * 60 + '%';
  ss.style.animationDelay = (i * 4 + Math.random() * 3) + 's';
  sky.appendChild(ss);
}

/* ========== 内部の星々 ========== */
const orb = document.getElementById('orb');
const colors = ['#ff9ed4','#a89bff','#9be7ff','#ffd9a8','#b8ffb8'];
for (let i = 0; i < 10; i++) {
  const inner = document.createElement('div');
  inner.className = 'inner-star';
  const color = colors[i % colors.length];
  inner.style.background = color;
  inner.style.boxShadow = `0 0 8px ${color}`;
  const radius = 50 + Math.random() * 70;
  const speed = 4 + Math.random() * 6;
  const startAngle = Math.random() * 360;
  inner.animate([
    { transform: `rotate(${startAngle}deg) translateX(${radius}px)` },
    { transform: `rotate(${startAngle + 360}deg) translateX(${radius}px)` }
  ], { duration: speed * 1000, iterations: Infinity });
  orb.appendChild(inner);
}

/* ========== 音 ========== */
let audioCtx;
function playTone(freq, time = 0, duration = 0.3, vol = 0.2, type='sine') {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.frequency.value = freq;
  osc.type = type;
  gain.gain.setValueAtTime(0, audioCtx.currentTime + time);
  gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + time + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + time + duration);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(audioCtx.currentTime + time);
  osc.stop(audioCtx.currentTime + time + duration);
}
function playFanfare() {
  [523.25, 659.25, 783.99, 1046.5, 1318.5].forEach((f,i) => playTone(f, i*0.12, 0.5));
}
function playTap() { playTone(880, 0, 0.15); }
function playCombo(level) {
  const base = 600 + level * 80;
  [base, base*1.25, base*1.5].forEach((f,i) => playTone(f, i*0.08, 0.3, 0.15));
}
function playComplete() {
  [523, 659, 784, 1047, 1319, 1568, 2093].forEach((f,i) => playTone(f, i*0.15, 0.6, 0.18));
}
function playWish() {
  playTone(1200 + Math.random()*400, 0, 0.4, 0.1);
  playTone(1800 + Math.random()*400, 0.05, 0.4, 0.08);
}
/* 沈思BGM（穏やかなドローン） */
let medOscs = [];
function startMedBGM() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  stopMedBGM();
  const freqs = [130.81, 196.00, 261.63]; // C3, G3, C4
  freqs.forEach(f => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = f;
    o.type = 'sine';
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 2);
    o.connect(g); g.connect(audioCtx.destination);
    o.start();
    medOscs.push({o, g});
  });
}
function stopMedBGM() {
  medOscs.forEach(({o,g}) => {
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1);
    setTimeout(() => { try { o.stop(); } catch {} }, 1100);
  });
  medOscs = [];
}

/* ========== ガチャ ========== */
let tapCount = 0;
let isSpinning = false;
let currentQ = '';
let currentQIdx = -1;
const dots = document.querySelectorAll('.tap-dot');
const statusEl = document.getElementById('status');
const displayText = document.getElementById('displayText');
const fallingStar = document.getElementById('fallingStar');
const handle = document.getElementById('handle');

const stages = [
  '✦ 星が共鳴し始める… ✦',
  '✦ もう少しで星が降りる… ✦',
  '✦ 宇宙からの問いが顕現… ✦'
];

orb.addEventListener('click', (e) => {
  if (isSpinning) return;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const rect = orb.getBoundingClientRect();
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.left = (e.clientX - rect.left) + 'px';
  ripple.style.top = (e.clientY - rect.top) + 'px';
  ripple.style.transform = 'translate(-50%,-50%)';
  orb.appendChild(ripple);
  setTimeout(() => ripple.remove(), 800);

  playTap();
  dots[tapCount].classList.add('active');
  statusEl.textContent = stages[tapCount];
  tapCount++;
  if (tapCount >= 3) spin();
});

function spin() {
  isSpinning = true;
  orb.classList.add('charging');
  handle.style.transform = 'rotate(720deg)';
  displayText.style.opacity = '0';

  setTimeout(() => {
    const color = colors[Math.floor(Math.random() * colors.length)];
    fallingStar.style.color = color;
    fallingStar.style.textShadow = `0 0 20px ${color}`;
    fallingStar.classList.add('active');
    playFanfare();
  }, 600);

  setTimeout(() => {
    orb.classList.remove('charging');
    showResult();
  }, 1900);
}

function updateCombo() {
  const now = Date.now();
  const W = 5*60*1000;
  if (state.lastPlayAt && now - state.lastPlayAt <= W) state.currentCombo++;
  else state.currentCombo = 1;
  state.lastPlayAt = now;
  if (state.currentCombo > state.bestCombo) state.bestCombo = state.currentCombo;
}
function showComboPopup(c) {
  if (c < 3) return;
  const el = document.getElementById('comboPopup');
  let text = `${c} COMBO!`;
  if (c >= 10) text = `🌟 ${c} BLAZING! 🌟`;
  else if (c >= 5) text = `✨ ${c} COMBO! ✨`;
  el.textContent = text;
  el.classList.remove('show'); void el.offsetWidth;
  el.classList.add('show');
  playCombo(c);
}

function showResult() {
  const qs = getQs();
  const modalQ = document.getElementById('modalQuestion');
  const metaTop = document.getElementById('resultMetaTop');

  if (qs.length === 0) {
    currentQ = '✧ 準備中 ✧\n\nまもなく星々が問いを授けます';
    currentQIdx = -1;
    modalQ.textContent = currentQ;
    metaTop.innerHTML = '';
    document.getElementById('modalBg').classList.add('show');
    burstStars(); reset();
    return;
  }

  const idx = Math.floor(Math.random() * qs.length);
  const pick = qs[idx];
  currentQ = pick;
  currentQIdx = idx;

  updateCombo();
  state.totalPlays++;
  const today = todayStr();
  const isDaily = state.lastDaily !== today;
  if (isDaily) state.lastDaily = today;

  if (!state.encountered[idx]) state.encountered[idx] = { count: 0, firstAt: Date.now() };
  state.encountered[idx].count++;
  state.encountered[idx].lastAt = Date.now();
  if (isDaily) state.encountered[idx].isDaily = true;

  state.history.unshift({
    q: pick, at: Date.now(), isDaily, combo: state.currentCombo, qIdx: idx
  });
  if (state.history.length > 100) state.history.pop();
  saveState(state);

  modalQ.textContent = pick;
  modalQ.classList.remove('fading');

  const enc = state.encountered[idx];
  let parts = [];
  if (isDaily) parts.push('<span class="daily-mark">☀ 今日の星</span>');
  if (enc.count === 1) parts.push('✨ 初めて出会った星');
  else parts.push(`✦ 遭遇 ${enc.count} 回目`);
  if (state.currentCombo >= 3) parts.push(`🔥 ${state.currentCombo} COMBO`);
  metaTop.innerHTML = parts.join(' ・ ');

  document.getElementById('modalBg').classList.add('show');
  burstStars();
  showComboPopup(state.currentCombo);
  updateHUD();

  const collected = Object.keys(state.encountered).length;
  if (collected === qs.length && qs.length > 0) {
    setTimeout(() => {
      document.getElementById('completeBanner').classList.add('show');
      playComplete();
    }, 1500);
  }
  reset();
}

function burstStars() {
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'burst-star';
    s.textContent = ['⭐','✦','✧','★','✨'][i % 5];
    s.style.color = colors[i % colors.length];
    s.style.left = '50%'; s.style.top = '50%';
    document.body.appendChild(s);
    const angle = (i / 50) * Math.PI * 2;
    const dist = 200 + Math.random() * 200;
    s.animate([
      { transform: 'translate(-50%,-50%) scale(0.5)', opacity: 1 },
      { transform: `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(1.2) rotate(${Math.random()*720}deg)`, opacity: 0 }
    ], { duration: 1200 + Math.random()*400, easing: 'cubic-bezier(.2,.7,.4,1)' });
    setTimeout(() => s.remove(), 1600);
  }
}

function reset() {
  tapCount = 0;
  dots.forEach(d => d.classList.remove('active'));
  fallingStar.classList.remove('active');
  setTimeout(() => {
    displayText.style.opacity = '0.8';
    statusEl.textContent = '✦ また星が待っている ✦';
    displayText.textContent = '✦ 球を3回タップ ✦';
    handle.style.transform = 'rotate(0deg)';
    isSpinning = false;
  }, 1500);
}

/* ========== HUD ========== */
function updateHUD() {
  const qs = getQs();
  const collected = Object.keys(state.encountered).length;
  document.getElementById('hudCollected').textContent = collected;
  document.getElementById('hudTotal').textContent = qs.length;
  document.getElementById('hudTotalPlays').textContent = state.totalPlays;
  const c = document.getElementById('hudCombo');
  if (state.currentCombo >= 2 && state.lastPlayAt && Date.now() - state.lastPlayAt < 5*60*1000) {
    c.style.display = 'inline-block';
    c.textContent = `×${state.currentCombo}`;
  } else {
    c.style.display = 'none';
  }
}

/* ========== ボタンアクション ========== */
document.getElementById('againBtn').addEventListener('click', () => {
  document.getElementById('modalBg').classList.remove('show');
});
document.getElementById('closeBtn').addEventListener('click', () => {
  document.getElementById('modalBg').classList.remove('show');
});

// 沈思モード
const meditationEl = document.getElementById('meditation');
let medTimer = null;
document.getElementById('meditateBtn').addEventListener('click', () => {
  document.getElementById('medQuestion').textContent = currentQ;
  meditationEl.classList.add('show');
  startMedBGM();
  let sec = 60;
  document.getElementById('medTimer').textContent = '01:00';
  document.getElementById('medProgressBar').style.width = '100%';
  medTimer = setInterval(() => {
    sec--;
    const m = String(Math.floor(sec/60)).padStart(2,'0');
    const s = String(sec%60).padStart(2,'0');
    document.getElementById('medTimer').textContent = `${m}:${s}`;
    document.getElementById('medProgressBar').style.width = (sec/60*100) + '%';
    if (sec <= 0) {
      closeMeditation();
      playFanfare();
      state.meditations++;
      saveState(state);
      showToast('✦ ありがとう、深い時間でした ✦');
    }
  }, 1000);
});
function closeMeditation() {
  clearInterval(medTimer);
  meditationEl.classList.remove('show');
  stopMedBGM();
}
document.getElementById('medClose').addEventListener('click', closeMeditation);
// 沈思中タップで願いの光
meditationEl.addEventListener('click', (e) => {
  if (e.target.id === 'medClose') return;
  const symbols = ['✦','✧','⭐','★','✨'];
  const w = document.createElement('div');
  w.className = 'wish-light';
  w.textContent = symbols[Math.floor(Math.random()*symbols.length)];
  w.style.left = e.clientX + 'px';
  w.style.top = e.clientY + 'px';
  document.body.appendChild(w);
  w.animate([
    { transform: 'translate(-50%,-50%) scale(0.5)', opacity: 1 },
    { transform: `translate(${(Math.random()-0.5)*100 - 50}%, -300%) scale(1.5)`, opacity: 0 }
  ], { duration: 2500 + Math.random()*1000, easing: 'ease-out' });
  playWish();
  setTimeout(() => w.remove(), 3500);
});

// 心の記録
document.getElementById('reflectBtn').addEventListener('click', () => {
  document.getElementById('reflectQ').textContent = currentQ;
  // 既存の記録があれば読み込む
  const existing = state.history.find(h => h.qIdx === currentQIdx && h.reflect);
  document.getElementById('reflectInput').value = existing ? existing.reflect : '';
  document.getElementById('reflectBg').classList.add('show');
});
document.getElementById('reflectCancel').addEventListener('click', () => {
  document.getElementById('reflectBg').classList.remove('show');
});
document.getElementById('reflectSave').addEventListener('click', () => {
  const txt = document.getElementById('reflectInput').value.trim();
  if (state.history[0]) {
    state.history[0].reflect = txt;
    saveState(state);
  }
  document.getElementById('reflectBg').classList.remove('show');
  showToast('✍️ 星に刻みました');
});

// 揺らぎ（一部を？で隠して再表示）
document.getElementById('shuffleBtn').addEventListener('click', () => {
  const qEl = document.getElementById('modalQuestion');
  qEl.classList.add('fading');
  setTimeout(() => {
    const arr = currentQ.split('');
    const candidates = [];
    arr.forEach((c, i) => {
      if (/[一-龥ぁ-んァ-ンー]/.test(c)) candidates.push(i);
    });
    // ランダムに15-25%隠す
    const hideCount = Math.max(1, Math.floor(candidates.length * (0.15 + Math.random()*0.15)));
    const shuffled = candidates.sort(() => Math.random() - 0.5).slice(0, hideCount);
    const masked = arr.map((c, i) => shuffled.includes(i) ? '？' : c).join('');
    qEl.textContent = masked;
    qEl.classList.remove('fading');
    playTone(660, 0, 0.2, 0.15);
    showToast('🎲 違う角度から見つめ直す');
    // 5秒後に元に戻す
    setTimeout(() => {
      qEl.classList.add('fading');
      setTimeout(() => {
        qEl.textContent = currentQ;
        qEl.classList.remove('fading');
      }, 400);
    }, 5000);
  }, 400);
});

// 画像保存（Canvas で生成）
document.getElementById('saveImgBtn').addEventListener('click', () => {
  const canvas = document.createElement('canvas');
  const W = 720, H = 1280;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  // 背景
  const grad = ctx.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#1a0533');
  grad.addColorStop(0.5,'#2d1b5e');
  grad.addColorStop(1,'#0a1a4a');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
  // 星
  for (let i = 0; i < 150; i++) {
    ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.random()*0.7})`;
    ctx.beginPath();
    ctx.arc(Math.random()*W, Math.random()*H, Math.random()*2, 0, Math.PI*2);
    ctx.fill();
  }
  // タイトル
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 28px serif';
  ctx.textAlign = 'center';
  ctx.fillText('✦ 宇宙からの問い ✦', W/2, 180);
  // 問い文（折り返し）
  ctx.fillStyle = '#fff';
  ctx.font = '38px serif';
  const maxW = W - 120;
  const lines = wrapText(ctx, currentQ, maxW);
  const startY = H/2 - (lines.length * 60)/2;
  lines.forEach((line, i) => {
    ctx.fillText(line, W/2, startY + i*60);
  });
  // 引用符
  ctx.fillStyle = 'rgba(255,215,0,0.4)';
  ctx.font = '120px serif';
  ctx.fillText('"', 100, startY - 20);
  ctx.fillText('"', W-100, startY + lines.length*60 + 60);
  // フッター
  ctx.fillStyle = '#ffd9a8';
  ctx.font = '20px sans-serif';
  ctx.fillText('🌌 星詠みの問いガチャ', W/2, H - 80);
  // 保存
  canvas.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `cosmic-question-${Date.now()}.png`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('🖼️ 画像を保存しました');
  });
});
function wrapText(ctx, text, maxW) {
  const lines = [];
  const paragraphs = text.split('\n');
  paragraphs.forEach(p => {
    let line = '';
    for (let i = 0; i < p.length; i++) {
      const test = line + p[i];
      if (ctx.measureText(test).width > maxW && line) {
        lines.push(line);
        line = p[i];
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);
  });
  return lines;
}

/* ========== 星座盤 ========== */
function renderConstellation() {
  const qs = getQs();
  const wrap = document.getElementById('constellation');
  wrap.innerHTML = '';
  if (qs.length === 0) {
    wrap.innerHTML = '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0.5;font-size:12px;">準備中…</div>';
    document.getElementById('progressText').textContent = '問いがまだありません';
    document.getElementById('progressBar').style.width = '0%';
    return;
  }
  qs.forEach((q, i) => {
    const seed = hash(q + i);
    const x = 8 + (seed % 84);
    const y = 10 + ((seed * 7) % 80);
    const star = document.createElement('div');
    const enc = state.encountered[i];
    const lit = !!enc;
    star.className = 'const-star ' + (lit ? 'lit' : 'unlit');
    star.textContent = lit ? '⭐' : '·';
    star.style.left = x + '%';
    star.style.top = y + '%';
    star.title = lit ? `${q}（${enc.count}回）` : '未発見';
    star.addEventListener('click', () => {
      if (lit) alert(`${q}\n\n出会った回数: ${enc.count}\n初遭遇: ${new Date(enc.firstAt).toLocaleString('ja-JP')}`);
      else alert('まだ出会っていない星です');
    });
    wrap.appendChild(star);
  });
  const collected = Object.keys(state.encountered).length;
  const total = qs.length;
  document.getElementById('progressBar').style.width = (collected/total*100) + '%';
  document.getElementById('progressText').textContent =
    collected === total
      ? '✦ すべての星と出会いました ✦'
      : `あと ${total - collected} 個の星が眠っている（${collected}/${total}）`;
}
function hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

/* ========== 履歴 ========== */
function renderHistory() {
  const list = document.getElementById('historyList');
  if (state.history.length === 0) {
    list.innerHTML = '<div class="history-empty">まだ問いを引いていません</div>';
    return;
  }
  list.innerHTML = state.history.slice(0, 50).map(h => {
    const d = new Date(h.at);
    const when = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const tags = [];
    if (h.isDaily) tags.push('☀ 今日の星');
    if (h.combo >= 3) tags.push(`🔥 ${h.combo}COMBO`);
    const reflect = h.reflect ? `<div class="reflect">✍️ ${escapeHTML(h.reflect)}</div>` : '';
    return `<div class="history-item ${h.isDaily?'daily':''}">
      <div class="when">${when}${tags.length?' ・ '+tags.join(' ・ '):''}</div>
      ${escapeHTML(h.q)}
      ${reflect}
    </div>`;
  }).join('');
}
function escapeHTML(s) {
  return s.replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[m]);
}

/* ========== 称号 ========== */

  { id: 'combo3',   name: '🔥 三つ星の共鳴',     check: s => s.bestCombo >= 3 },
  { id: 'combo5',   name: '✨ 五連星の使徒',     check: s => s.bestCombo >= 5 },
  { id: 'combo10',  name: '🌠 星雨を呼ぶ者',     check: s => s.bestCombo >= 10 },
  { id: 'half',     name: '🌓 半天の探索者',     check: s => { const qs=getQs(); return qs.length>0 && Object.keys(s.encountered).length >= qs.length/2; }},
  { id: 'complete', name: '👑 星座完成の証',     check: s => { const qs=getQs(); return qs.length>0 && Object.keys(s.encountered).length >= qs.length; }},
  { id: 'med1',     name: '🧘 静寂の入口',       check: s => (s.meditations||0) >= 1 },
  { id: 'med10',    name: '🌙 沈思の旅人',       check: s => (s.meditations||0) >= 10 },
  { id: 'reflect',  name: '✍️ 心を綴る者',       check: s => s.history.some(h => h.reflect) },
];
function renderTitles() {
  const list = document.getElementById('titlesList');
  list.innerHTML = TITLES.map(t => {
    const got = t.check(state);
    return `<div class="title-badge ${got?'':'locked'}">${got?t.name:'??? ' + t.name.replace(/^[^ ]+ /,'')}</div>`;
  }).join('');
}
