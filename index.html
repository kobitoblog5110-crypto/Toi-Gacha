<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>💎 問いガチャ - PREMIUM 💎</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: 'Impact', 'Arial Black', 'Hiragino Sans', sans-serif;
    background: 
      radial-gradient(ellipse at center, #1a0033 0%, #0a0015 50%, #000 100%);
    min-height: 100vh; display:flex; justify-content:center; align-items:center;
    overflow-x:hidden; user-select:none; padding:20px 10px;
    position:relative;
  }
  /* 背景の光の柱 */
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none;
    background: 
      repeating-linear-gradient(90deg,
        transparent 0px,
        transparent 60px,
        rgba(255,215,0,0.03) 60px,
        rgba(255,215,0,0.03) 62px);
    z-index:0;
  }
  /* 背景の点滅光 */
  body::after {
    content:''; position:fixed; inset:0; pointer-events:none;
    background: 
      radial-gradient(circle at 20% 30%, rgba(255,0,150,0.15), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(0,200,255,0.15), transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(255,215,0,0.1), transparent 60%);
    z-index:0;
    animation: bgPulse 3s ease-in-out infinite;
  }
  @keyframes bgPulse {
    0%,100% { opacity:0.6; }
    50% { opacity:1; }
  }

  /* 流れ星パーティクル */
  .particle {
    position:fixed; pointer-events:none; z-index:1;
    width:3px; height:3px; border-radius:50%;
    background: #ffd700;
    box-shadow: 0 0 8px #ffd700, 0 0 15px #ffaa00;
    animation: particleFloat linear infinite;
  }
  @keyframes particleFloat {
    0% { transform:translateY(100vh) translateX(0); opacity:0; }
    10% { opacity:1; }
    90% { opacity:1; }
    100% { transform:translateY(-10vh) translateX(50px); opacity:0; }
  }

  .container { text-align:center; z-index:2; position:relative; }

  /* === タイトル === */
  h1 {
    font-size:3em; margin-bottom:5px;
    background: linear-gradient(180deg, 
      #fff8dc 0%, 
      #ffd700 30%, 
      #ffaa00 50%, 
      #ff8c00 70%, 
      #ffd700 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 
      0 0 20px rgba(255,215,0,0.6),
      0 0 40px rgba(255,170,0,0.4);
    letter-spacing:0.1em;
    filter: drop-shadow(2px 2px 0 #8b4513) drop-shadow(0 0 30px rgba(255,215,0,0.5));
    animation: goldGlow 2s ease-in-out infinite;
  }
  @keyframes goldGlow {
    0%,100% { filter: drop-shadow(2px 2px 0 #8b4513) drop-shadow(0 0 30px rgba(255,215,0,0.5)); }
    50% { filter: drop-shadow(2px 2px 0 #8b4513) drop-shadow(0 0 50px rgba(255,215,0,0.9)); }
  }
  .subtitle {
    color:#ffd700; margin-bottom:20px; font-size:0.95em;
    letter-spacing:0.3em;
    text-shadow: 0 0 10px rgba(255,215,0,0.8);
  }
  .subtitle::before, .subtitle::after { content:'✦'; margin:0 10px; }

  /* === 装飾フレーム（外枠） === */
  .frame {
    position:relative;
    padding:20px 15px;
    background: 
      linear-gradient(135deg, 
        #1a0a00 0%, 
        #2a1500 30%,
        #1a0a00 60%,
        #2a1500 100%);
    border-radius: 25px;
    box-shadow:
      0 0 0 3px #ffd700,
      0 0 0 6px #8b6914,
      0 0 0 9px #ffd700,
      0 0 30px rgba(255,215,0,0.6),
      0 0 60px rgba(255,170,0,0.3),
      inset 0 0 50px rgba(0,0,0,0.5);
  }
  /* LEDライト（フレーム周り） */
  .frame::before, .frame::after {
    content:''; position:absolute;
    border-radius: 25px;
    pointer-events:none;
  }
  .frame::before {
    inset:-12px;
    background: 
      repeating-linear-gradient(0deg,
        transparent 0px,
        transparent 12px,
        #ff0066 12px,
        #ff0066 14px,
        transparent 14px,
        transparent 26px),
      repeating-linear-gradient(90deg,
        transparent 0px,
        transparent 12px,
        #00ddff 12px,
        #00ddff 14px,
        transparent 14px,
        transparent 26px);
    background-blend-mode: screen;
    -webkit-mask: 
      linear-gradient(#000 0 0) content-box, 
      linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    padding:8px;
    animation: ledFlow 1.5s linear infinite;
    opacity:0.7;
    filter: blur(1px);
  }
  @keyframes ledFlow {
    0% { filter: hue-rotate(0deg) blur(1px); }
    100% { filter: hue-rotate(360deg) blur(1px); }
  }

  /* 装飾用のコーナーダイヤ */
  .corner-jewel {
    position:absolute; width:25px; height:25px;
    background: radial-gradient(circle at 35% 35%, #fff, #ff0066 50%, #990033);
    border-radius:50%;
    box-shadow: 
      0 0 15px #ff0066,
      0 0 25px rgba(255,0,102,0.6),
      inset 0 0 5px rgba(255,255,255,0.5);
    z-index:5;
    animation: jewelBlink 1s ease-in-out infinite;
  }
  .corner-jewel.tl { top:8px; left:8px; }
  .corner-jewel.tr { top:8px; right:8px; }
  .corner-jewel.bl { bottom:8px; left:8px; }
  .corner-jewel.br { bottom:8px; right:8px; }
  @keyframes jewelBlink {
    0%,100% { transform:scale(1); box-shadow: 0 0 15px #ff0066, 0 0 25px rgba(255,0,102,0.6); }
    50% { transform:scale(1.2); box-shadow: 0 0 25px #ff0066, 0 0 40px rgba(255,0,102,0.9); }
  }

  /* === ガチャマシン === */
  .machine-wrapper {
    width:340px; margin:0 auto; position:relative;
    filter: drop-shadow(0 25px 35px rgba(255,215,0,0.3));
  }

  /* ===== ドーム ===== */
  .dome {
    width:300px; height:280px; margin:0 auto;
    position:relative;
    border-radius: 150px 150px 15px 15px;
    background: 
      radial-gradient(ellipse at 30% 25%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.4) 25%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(255,215,0,0.2) 0%, transparent 40%),
      linear-gradient(180deg, 
        rgba(255,250,240,0.5) 0%, 
        rgba(255,235,200,0.4) 50%, 
        rgba(255,215,180,0.5) 100%);
    border: 4px solid #ffd700;
    border-bottom: 5px solid #b8860b;
    box-shadow: 
      inset -20px -25px 50px rgba(180,130,11,0.3),
      inset 20px 20px 40px rgba(255,255,255,0.7),
      0 0 30px rgba(255,215,0,0.5),
      0 0 0 2px #b8860b;
    overflow:hidden;
  }
  .dome::before {
    content:''; position:absolute;
    top:15px; left:35px; width:80px; height:130px;
    background: linear-gradient(135deg, 
      rgba(255,255,255,0.95) 0%, 
      rgba(255,255,255,0.4) 40%,
      transparent 80%);
    border-radius:50%;
    transform: rotate(-15deg);
    filter: blur(2px);
  }
  .dome::after {
    content:''; position:absolute;
    top:50px; right:40px; width:25px; height:50px;
    background: linear-gradient(135deg, rgba(255,255,255,0.7), transparent);
    border-radius:50%;
    transform: rotate(20deg);
    filter: blur(1px);
  }

  .capsules {
    position:absolute; bottom:5px; left:0; right:0;
    height:75%;
    display:flex; flex-wrap:wrap; justify-content:center; align-items:flex-end;
    padding:0 25px 5px;
    gap:5px;
  }
  .capsule {
    width:42px; height:42px; border-radius:50%;
    position:relative;
    box-shadow: 
      inset -5px -5px 10px rgba(0,0,0,0.3),
      inset 4px 4px 8px rgba(255,255,255,0.7),
      0 3px 5px rgba(0,0,0,0.3),
      0 0 10px rgba(255,215,0,0.3);
    animation: jiggle 3s ease-in-out infinite;
  }
  .capsule::before {
    content:''; position:absolute;
    top:50%; left:0; right:0; height:1.5px;
    background: rgba(0,0,0,0.3);
    transform:translateY(-50%);
  }
  .capsule::after {
    content:''; position:absolute;
    top:6px; left:9px; width:13px; height:9px;
    background:rgba(255,255,255,0.9); border-radius:50%;
    filter: blur(0.5px);
  }
  .capsule.shake { animation: shakeCapsule 0.25s ease-in-out infinite; }
  @keyframes jiggle {
    0%,100% { transform:translateY(0) rotate(0); }
    50% { transform:translateY(-2px) rotate(3deg); }
  }
  @keyframes shakeCapsule {
    0%,100% { transform:translate(0,0) rotate(0); }
    20% { transform:translate(-4px,-3px) rotate(-20deg); }
    40% { transform:translate(3px,-4px) rotate(15deg); }
    60% { transform:translate(-3px,2px) rotate(-10deg); }
    80% { transform:translate(2px,-2px) rotate(8deg); }
  }
  .capsule.c1 { background: radial-gradient(circle at 35% 30%, #ffe5e5, #ff1744 60%, #b71c1c); }
  .capsule.c2 { background: radial-gradient(circle at 35% 30%, #e0f7ff, #00b8d4 60%, #006978); }
  .capsule.c3 { background: radial-gradient(circle at 35% 30%, #fff8e1, #ffc107 60%, #ff6f00); }
  .capsule.c4 { background: radial-gradient(circle at 35% 30%, #f3e5f5, #aa00ff 60%, #4a0072); }
  .capsule.c5 { background: radial-gradient(circle at 35% 30%, #e8f5e9, #00c853 60%, #1b5e20); }

  /* ===== ゴールドリング ===== */
  .ring {
    width:320px; height:30px; margin:-5px auto 0;
    background: 
      linear-gradient(180deg, 
        #fff8dc 0%, 
        #ffd700 25%, 
        #b8860b 50%, 
        #ffd700 75%, 
        #fff8dc 100%);
    border-radius: 8px 8px 0 0;
    box-shadow: 
      inset 0 2px 4px rgba(255,255,255,0.8),
      inset 0 -3px 6px rgba(0,0,0,0.4),
      0 2px 4px rgba(0,0,0,0.4),
      0 0 20px rgba(255,215,0,0.6);
    position:relative; z-index:2;
  }
  /* リング上の装飾 */
  .ring::before {
    content:''; position:absolute;
    top:50%; left:0; right:0; height:2px;
    background: linear-gradient(90deg, 
      transparent, #fff8dc 20%, #fff8dc 80%, transparent);
    transform:translateY(-50%);
    filter: blur(1px);
  }

  /* ===== 本体ボディ（ブラック＆ゴールド） ===== */
  .body-section {
    width:320px; height:280px; margin:0 auto;
    background: 
      linear-gradient(180deg, 
        #1a1a1a 0%, 
        #0a0a0a 30%, 
        #000 70%,
        #1a1a1a 100%);
    position:relative;
    box-shadow: 
      inset -15px 0 25px rgba(255,215,0,0.1),
      inset 15px 0 25px rgba(255,215,0,0.05),
      inset 0 -10px 20px rgba(0,0,0,0.6);
    border-left: 2px solid #ffd700;
    border-right: 2px solid #ffd700;
  }
  /* 縦のゴールドストライプ */
  .body-section::before, .body-section::after {
    content:''; position:absolute;
    top:0; bottom:0; width:3px;
    background: linear-gradient(180deg, 
      transparent, 
      #ffd700 20%, 
      #ffaa00 50%,
      #ffd700 80%, 
      transparent);
    box-shadow: 0 0 10px rgba(255,215,0,0.6);
  }
  .body-section::before { left:30px; }
  .body-section::after { right:30px; }

  /* タイトルプレート */
  .title-plate {
    position:absolute; top:18px; left:50%; transform:translateX(-50%);
    background: linear-gradient(180deg, 
      #fff8dc 0%, 
      #ffd700 50%, 
      #b8860b 100%);
    padding:10px 28px; border-radius:6px;
    font-size:1.05em; font-weight:bold; color:#000;
    border: 2px solid #fff8dc;
    box-shadow: 
      inset 0 2px 3px rgba(255,255,255,0.9),
      inset 0 -2px 3px rgba(0,0,0,0.3),
      0 4px 0 #8b6914, 
      0 6px 12px rgba(0,0,0,0.5),
      0 0 20px rgba(255,215,0,0.5);
    letter-spacing:0.2em;
    text-shadow: 0 1px 0 rgba(255,255,255,0.5);
    animation: platePulse 2s ease-in-out infinite;
  }
  @keyframes platePulse {
    0%,100% { box-shadow: inset 0 2px 3px rgba(255,255,255,0.9), inset 0 -2px 3px rgba(0,0,0,0.3), 0 4px 0 #8b6914, 0 6px 12px rgba(0,0,0,0.5), 0 0 20px rgba(255,215,0,0.5); }
    50% { box-shadow: inset 0 2px 3px rgba(255,255,255,0.9), inset 0 -2px 3px rgba(0,0,0,0.3), 0 4px 0 #8b6914, 0 6px 12px rgba(0,0,0,0.5), 0 0 35px rgba(255,215,0,0.9); }
  }

  /* サイドのネオン装飾 */
  .neon-side {
    position:absolute; top:65px; width:8px; height:140px;
    border-radius:4px;
    background: linear-gradient(180deg, #ff00ff, #00ffff);
    box-shadow: 
      0 0 10px #ff00ff,
      0 0 20px #00ffff,
      inset 0 0 5px rgba(255,255,255,0.5);
    animation: neonShift 2s linear infinite;
  }
  .neon-side.left { left:8px; }
  .neon-side.right { right:8px; }
  @keyframes neonShift {
    0%,100% { filter: hue-rotate(0deg); }
    50% { filter: hue-rotate(180deg); }
  }

  /* 取り出し口 */
  .slot {
    position:absolute; top:80px; left:50%; transform:translateX(-50%);
    width:180px; height:130px;
    background: 
      radial-gradient(ellipse at center, #1a0033 0%, #000 70%);
    border-radius: 8px;
    border: 4px solid #ffd700;
    box-shadow: 
      inset 0 8px 20px rgba(0,0,0,0.95),
      inset 0 -2px 5px rgba(255,215,0,0.2),
      0 2px 4px rgba(0,0,0,0.5),
      0 0 25px rgba(255,215,0,0.5),
      0 0 0 2px #b8860b;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  /* スロットのガラス反射 */
  .slot::before {
    content:''; position:absolute;
    top:5px; left:5px; right:5px; height:30px;
    background: linear-gradient(180deg, 
      rgba(255,215,0,0.2), 
      transparent);
    border-radius:4px;
    pointer-events:none;
    z-index:3;
  }
  /* スロット内部の光線 */
  .slot::after {
    content:''; position:absolute;
    inset:0;
    background: 
      conic-gradient(from 0deg at 50% 100%,
        transparent 0deg,
        rgba(255,215,0,0.15) 30deg,
        transparent 60deg,
        rgba(255,0,255,0.15) 120deg,
        transparent 150deg,
        rgba(0,255,255,0.15) 210deg,
        transparent 240deg,
        rgba(255,215,0,0.15) 330deg,
        transparent 360deg);
    animation: slotBeam 4s linear infinite;
    pointer-events:none;
  }
  @keyframes slotBeam {
    from { transform:rotate(0); }
    to { transform:rotate(360deg); }
  }
  .slot-message {
    color:#ffd700; font-size:1em; font-weight:bold;
    text-align:center; padding:5px;
    text-shadow: 
      0 0 10px rgba(255,215,0,0.9), 
      0 0 20px rgba(255,170,0,0.6),
      0 0 30px rgba(255,100,0,0.4);
    z-index:5; position:relative;
    letter-spacing:0.1em;
  }

  .falling-capsule {
    position:absolute; width:55px; height:55px; border-radius:50%;
    box-shadow: 
      inset -6px -6px 12px rgba(0,0,0,0.4),
      inset 5px 5px 10px rgba(255,255,255,0.7),
      0 5px 12px rgba(0,0,0,0.5),
      0 0 20px rgba(255,215,0,0.6);
    top:-70px; left:50%; transform:translateX(-50%);
    opacity:0; z-index:5;
  }
  .falling-capsule::before {
    content:''; position:absolute;
    top:50%; left:0; right:0; height:2px;
    background: rgba(0,0,0,0.3);
    transform:translateY(-50%);
  }
  .falling-capsule::after {
    content:''; position:absolute;
    top:9px; left:14px; width:16px; height:11px;
    background:rgba(255,255,255,0.9); border-radius:50%;
    filter: blur(0.5px);
  }
  .falling-capsule.drop {
    animation: dropCapsule 1.5s cubic-bezier(0.5, 0.05, 0.7, 1) forwards;
  }
  @keyframes dropCapsule {
    0% { top:-70px; opacity:0; transform:translateX(-50%) rotate(0); }
    15% { opacity:1; }
    40% { top:25px; transform:translateX(-50%) rotate(180deg); }
    55% { top:55px; transform:translateX(-50%) rotate(280deg); }
    65% { top:70px; transform:translateX(-50%) rotate(340deg); }
    72% { top:60px; transform:translateX(-50%) rotate(360deg); }
    80% { top:68px; transform:translateX(-55%) rotate(370deg); }
    88% { top:62px; transform:translateX(-48%) rotate(355deg); }
    100% { top:65px; opacity:1; transform:translateX(-50%) rotate(360deg); }
  }

  /* ハンドル */
  .handle-area {
    position:absolute; bottom:35px; left:50%; transform:translateX(-50%);
    width:100px; height:100px;
  }
  .handle-base {
    position:absolute; inset:0;
    background: 
      radial-gradient(circle at 35% 35%, 
        #fff8dc 0%, 
        #ffd700 30%, 
        #b8860b 70%, 
        #5d4310 100%);
    border-radius:50%;
    box-shadow: 
      inset 0 -8px 15px rgba(0,0,0,0.5),
      inset 0 6px 12px rgba(255,255,255,0.5),
      0 5px 12px rgba(0,0,0,0.5),
      0 0 0 4px #2a1a00,
      0 0 20px rgba(255,215,0,0.7);
  }
  .handle-base::before {
    content:''; position:absolute;
    inset:10px; border-radius:50%;
    background: 
      radial-gradient(circle at 50% 50%, transparent 30%, rgba(0,0,0,0.2) 100%);
  }
  /* ベースリング装飾 */
  .handle-base::after {
    content:''; position:absolute;
    inset:-8px; border-radius:50%;
    border: 2px dashed #ffd700;
    animation: ringRotate 8s linear infinite;
    opacity:0.6;
  }
  @keyframes ringRotate {
    from { transform:rotate(0); }
    to { transform:rotate(360deg); }
  }

  .handle {
    position:absolute; inset:0;
    cursor:grab;
    transition: transform 0.05s linear;
    z-index:2;
  }
  .handle:active { cursor:grabbing; }
  .handle::before {
    content:''; position:absolute;
    top:50%; left:50%;
    width:85px; height:18px;
    background: linear-gradient(180deg, 
      #fff8dc 0%, #ffd700 30%, #b8860b 70%, #5d4310 100%);
    border-radius:9px;
    transform:translate(-50%,-50%);
    box-shadow: 
      0 3px 6px rgba(0,0,0,0.6),
      inset 0 2px 3px rgba(255,255,255,0.7),
      inset 0 -2px 3px rgba(0,0,0,0.4),
      0 0 15px rgba(255,215,0,0.6);
  }
  .handle::after {
    content:''; position:absolute;
    top:50%; left:50%;
    width:26px; height:26px;
    background: 
      radial-gradient(circle at 35% 35%, 
        #fff 0%, 
        #ff1744 40%, 
        #b71c1c 80%);
    border-radius:50%;
    transform:translate(-50%,-50%);
    box-shadow: 
      inset 0 -3px 5px rgba(0,0,0,0.5),
      0 0 0 3px #ffd700,
      0 2px 4px rgba(0,0,0,0.4),
      0 0 15px rgba(255,0,0,0.7);
    z-index:1;
  }
  .handle.spinning { animation: handleSpin 0.4s linear infinite; }
  @keyframes handleSpin {
    from { transform:rotate(0); }
    to { transform:rotate(360deg); }
  }

  /* 取り出しトレイ */
  .tray {
    width:340px; height:38px; margin:-2px auto 0;
    background: 
      linear-gradient(180deg, 
        #1a1a1a 0%, #000 50%, #0a0a0a 100%);
    border-radius: 0 0 6px 6px;
    box-shadow: 
      inset 0 5px 10px rgba(0,0,0,0.8),
      0 3px 5px rgba(0,0,0,0.5),
      0 0 0 2px #ffd700;
    position:relative;
  }
  .tray::before {
    content:''; position:absolute;
    top:8px; left:50%; transform:translateX(-50%);
    width:140px; height:20px;
    background: #050505;
    border-radius:3px;
    box-shadow: 
      inset 0 3px 8px rgba(0,0,0,0.95),
      0 0 8px rgba(255,215,0,0.4);
  }

  /* マシンの揺れ */
  .machine-wrapper.shaking { animation: machineShake 0.12s ease-in-out infinite; }
  @keyframes machineShake {
    0%,100% { transform:translateX(0) rotate(0); }
    25% { transform:translateX(-4px) rotate(-0.6deg); }
    75% { transform:translateX(4px) rotate(0.6deg); }
  }

  .hint {
    margin-top:25px; color:#ffd700; font-size:1em; font-weight:bold;
    background:rgba(0,0,0,0.7);
    padding:14px 26px; border-radius:25px;
    display:inline-block;
    border: 2px solid #ffd700;
    box-shadow:
      0 0 20px rgba(255,215,0,0.5),
      inset 0 0 15px rgba(255,215,0,0.1);
    letter-spacing:0.15em;
    text-shadow: 0 0 10px rgba(255,215,0,0.6);
  }
  .hint .arrow { display:inline-block; animation: pointArrow 1s ease-in-out infinite; color:#ff0066; text-shadow: 0 0 10px #ff0066; }
  @keyframes pointArrow {
    0%,100% { transform:translateY(0); }
    50% { transform:translateY(5px); }
  }

  /* === モーダル === */
  .modal {
    position:fixed; inset:0; background:rgba(0,0,0,0.85);
    display:none; justify-content:center; align-items:center; z-index:200;
    padding:20px; backdrop-filter: blur(8px);
  }
  .modal.show { display:flex; animation: fadeIn 0.4s; }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .modal-content {
    background: 
      linear-gradient(135deg, #1a0a00 0%, #0a0500 100%);
    padding:45px 30px; border-radius:25px;
    max-width:440px; width:100%; text-align:center;
    box-shadow:
      0 0 0 3px #ffd700,
      0 0 0 6px #b8860b,
      0 0 0 9px #ffd700,
      0 20px 60px rgba(255,215,0,0.5),
      0 0 80px rgba(255,170,0,0.3);
    animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
    position:relative;
    border: 2px solid #ffd700;
  }
  @keyframes popIn { 
    0% { transform:scale(0.3) rotate(-10deg); opacity:0; }
    100% { transform:scale(1) rotate(0); opacity:1; }
  }

  /* モーダル内の光線エフェクト */
  .modal-content::before {
    content:''; position:absolute;
    inset:-2px;
    background: conic-gradient(
      from 0deg,
      transparent 0deg,
      #ffd700 60deg,
      transparent 120deg,
      #ff0066 180deg,
      transparent 240deg,
      #00ddff 300deg,
      transparent 360deg);
    border-radius:25px;
    z-index:-1;
    animation: rotateBeam 4s linear infinite;
    opacity:0.7;
    filter: blur(8px);
  }
  @keyframes rotateBeam {
    from { transform:rotate(0); }
    to { transform:rotate(360deg); }
  }

  .modal-content::after {
    content:'💎'; position:absolute; top:-30px; left:50%;
    transform:translateX(-50%);
    font-size:3em;
    animation: jewelBounce 1s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.8));
  }
  @keyframes jewelBounce {
    0%,100% { transform:translateX(-50%) translateY(0) rotate(0); }
    50% { transform:translateX(-50%) translateY(-10px) rotate(360deg); }
  }

  .question-label {
    color:#ffd700; font-size:0.9em; margin:20px 0 20px;
    letter-spacing:0.4em; font-weight:bold;
    text-shadow: 0 0 15px rgba(255,215,0,0.7);
  }
  .question-label::before, .question-label::after {
    content:'✦'; color:#ff0066; margin:0 10px;
    text-shadow: 0 0 10px #ff0066;
  }
  .question-text {
    font-size:1.4em; color:#fff; line-height:1.7;
    margin-bottom:30px; font-weight:bold;
    padding:25px 18px;
    background: 
      linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,0,102,0.05));
    border-radius:15px;
    border: 1px solid rgba(255,215,0,0.4);
    text-shadow: 0 0 10px rgba(255,255,255,0.3);
    font-family:'Hiragino Sans','Yu Gothic',sans-serif;
  }
  .btn-group { display:flex; gap:12px; flex-direction:column; }
  .btn {
    padding:16px 22px; border:none; border-radius:30px;
    font-size:1em; font-weight:bold; cursor:pointer;
    transition:all 0.2s;
    font-family:inherit;
    letter-spacing:0.1em;
  }
  .btn:hover { transform:translateY(-3px); }
  .btn:active { transform:translateY(0); }
  .btn-primary {
    background:linear-gradient(135deg, #ffd700 0%, #ffaa00 50%, #ff8c00 100%);
    color:#000;
    box-shadow:
      0 4px 0 #8b6914, 
      0 6px 15px rgba(255,170,0,0.6),
      inset 0 2px 3px rgba(255,255,255,0.5),
      0 0 20px rgba(255,215,0,0.5);
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
  }
  .btn-primary:hover { 
    box-shadow:0 6px 0 #8b6914, 0 10px 20px rgba(255,170,0,0.8), inset 0 2px 3px rgba(255,255,255,0.5), 0 0 30px rgba(255,215,0,0.8);
  }
  .btn-secondary {
    background:linear-gradient(135deg, #1a1a1a, #000);
    color:#ffd700;
    border:2px solid #ffd700;
    box-shadow:0 4px 0 #8b6914, 0 0 15px rgba(255,215,0,0.4);
    text-shadow: 0 0 8px rgba(255,215,0,0.6);
  }
  .btn-secondary:hover { box-shadow:0 6px 0 #8b6914, 0 0 25px rgba(255,215,0,0.7); }

  .sparkle {
    position:fixed; pointer-events:none; z-index:150;
    font-size:2em;
  }

  @media (max-width:380px) {
    .machine-wrapper { width:300px; }
    .dome { width:270px; height:250px; }
    .ring, .body-section, .tray { width:290px; }
    .body-section { height:260px; }
    h1 { font-size:2.3em; }
  }
</style>
</head>
<body>
  <!-- 流れ星パーティクル -->
  <div class="particle" style="left:10%; animation-duration:8s;"></div>
  <div class="particle" style="left:25%; animation-duration:12s; animation-delay:2s;"></div>
  <div class="particle" style="left:50%; animation-duration:10s; animation-delay:4s;"></div>
  <div class="particle" style="left:75%; animation-duration:14s; animation-delay:1s;"></div>
  <div class="particle" style="left:90%; animation-duration:9s; animation-delay:5s;"></div>
  <div class="particle" style="left:35%; animation-duration:11s; animation-delay:3s;"></div>
  <div class="particle" style="left:60%; animation-duration:13s; animation-delay:6s;"></div>

  <div class="container">
    <h1>問いガチャ</h1>
    <p class="subtitle">PREMIUM EDITION</p>

    <div class="frame">
      <div class="corner-jewel tl"></div>
      <div class="corner-jewel tr"></div>
      <div class="corner-jewel bl"></div>
      <div class="corner-jewel br"></div>

      <div class="machine-wrapper" id="machine">
        <div class="dome">
          <div class="capsules" id="capsules">
            <div class="capsule c1"></div><div class="capsule c2"></div>
            <div class="capsule c3"></div><div class="capsule c4"></div>
            <div class="capsule c5"></div><div class="capsule c1"></div>
            <div class="capsule c2"></div><div class="capsule c3"></div>
            <div class="capsule c4"></div><div class="capsule c5"></div>
            <div class="capsule c1"></div><div class="capsule c2"></div>
            <div class="capsule c3"></div><div class="capsule c4"></div>
            <div class="capsule c5"></div>
          </div>
        </div>

        <div class="ring"></div>

        <div class="body-section">
          <div class="title-plate">QUESTION</div>
          <div class="neon-side left"></div>
          <div class="neon-side right"></div>
          <div class="slot">
            <div class="slot-message" id="slotMessage">
              ★ READY ★<br>SPIN THE HANDLE
            </div>
            <div class="falling-capsule" id="fallingCapsule"></div>
          </div>
          <div class="handle-area">
            <div class="handle-base"></div>
            <div class="handle" id="handle"></div>
          </div>
        </div>

        <div class="tray"></div>
      </div>
    </div>

    <p class="hint">👇 SPIN <span class="arrow">↓</span> THE HANDLE</p>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="question-label">TODAY'S QUESTION</div>
      <div class="question-text" id="questionText"></div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="spinAgain()">🎰 SPIN AGAIN</button>
        <button class="btn btn-secondary" onclick="backToTitle()">⬅ BACK TO TITLE</button>
      </div>
    </div>
  </div>

<script>
  const DEFAULT_QUESTIONS = [
    "もし明日世界が終わるなら、最後に誰と何を話したい？",
    "あなたにとって「自由」とは何ですか？",
    "10年前の自分に一言だけ伝えられるとしたら？",
    "幸せの定義を、自分の言葉で言うと？",
    "失敗から学んだ最大のことは何ですか？"
  ];

  function getQuestions() {
    const stored = localStorage.getItem('toiGachaQuestions');
    if (stored) {
      const arr = JSON.parse(stored);
      if (arr.length > 0) return arr;
    }
    return DEFAULT_QUESTIONS;
  }

  const handle = document.getElementById('handle');
  const machine = document.getElementById('machine');
  const capsules = document.getElementById('capsules');
  const slotMessage = document.getElementById('slotMessage');
  const fallingCapsule = document.getElementById('fallingCapsule');
  const modal = document.getElementById('modal');
  const questionText = document.getElementById('questionText');

  let isDragging = false;
  let lastAngle = 0;
  let totalRotation = 0;
  let currentRotation = 0;
  let isSpinning = false;
  let lastClickRotation = 0;

  let audioCtx;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  function playClick() {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = 850; o.type = 'square';
    g.gain.setValueAtTime(0.08, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
    o.start(); o.stop(audioCtx.currentTime + 0.04);
  }
  function playDrop() {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.setValueAtTime(450, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(70, audioCtx.currentTime + 0.35);
    o.type = 'sine';
    g.gain.setValueAtTime(0.35, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
    o.start(); o.stop(audioCtx.currentTime + 0.35);
  }
  function playFanfare() {
    if (!audioCtx) return;
    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
    notes.forEach((freq, i) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = freq; o.type = 'triangle';
      const t = audioCtx.currentTime + i * 0.1;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.25, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.start(t); o.stop(t + 0.4);
    });
  }

  function getAngle(e) {
    const rect = handle.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - cx;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - cy;
    return Math.atan2(y, x) * 180 / Math.PI;
  }

  function startDrag(e) {
    if (isSpinning) return;
    initAudio();
    isDragging = true;
    lastAngle = getAngle(e);
    totalRotation = 0;
    e.preventDefault();
  }

  function moveDrag(e) {
    if (!isDragging) return;
    const currentAngle = getAngle(e);
    let diff = currentAngle - lastAngle;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    totalRotation += Math.abs(diff);
    currentRotation += diff;
    lastAngle = currentAngle;
    handle.style.transform = `rotate(${currentRotation}deg)`;

    if (totalRotation - lastClickRotation > 25) {
      playClick();
      lastClickRotation = totalRotation;
      capsules.querySelectorAll('.capsule').forEach(c => {
        if (Math.random() > 0.6) {
          c.classList.add('shake');
          setTimeout(()=>c.classList.remove('shake'), 250);
        }
      });
    }

    if (totalRotation > 360) triggerGacha();
    e.preventDefault();
  }

  function endDrag() { isDragging = false; }

  function triggerGacha() {
    if (isSpinning) return;
    isSpinning = true;
    isDragging = false;

    machine.classList.add('shaking');
    handle.classList.add('spinning');
    capsules.querySelectorAll('.capsule').forEach(c => c.classList.add('shake'));
    slotMessage.innerHTML = '🎰 SPINNING... 🎰';

    let clickInterval = setInterval(playClick, 90);

    setTimeout(() => {
      clearInterval(clickInterval);
      machine.classList.remove('shaking');
      handle.classList.remove('spinning');
      capsules.querySelectorAll('.capsule').forEach(c => c.classList.remove('shake'));
      slotMessage.innerHTML = '';

      const colors = [
        'radial-gradient(circle at 35% 30%, #ffe5e5, #ff1744 60%, #b71c1c)',
        'radial-gradient(circle at 35% 30%, #e0f7ff, #00b8d4 60%, #006978)',
        'radial-gradient(circle at 35% 30%, #fff8e1, #ffc107 60%, #ff6f00)',
        'radial-gradient(circle at 35% 30%, #f3e5f5, #aa00ff 60%, #4a0072)',
        'radial-gradient(circle at 35% 30%, #e8f5e9, #00c853 60%, #1b5e20)'
      ];
      fallingCapsule.style.background = colors[Math.floor(Math.random()*colors.length)];
      fallingCapsule.classList.remove('drop');
      void fallingCapsule.offsetWidth;
      fallingCapsule.classList.add('drop');
      setTimeout(playDrop, 850);

      setTimeout(() => {
        playFanfare();
        showSparkles();
        const questions = getQuestions();
        const picked = questions[Math.floor(Math.random() * questions.length)];
        questionText.textContent = picked;
        modal.classList.add('show');
        setTimeout(() => {
          fallingCapsule.classList.remove('drop');
          slotMessage.innerHTML = '★ READY ★<br>SPIN THE HANDLE';
          handle.style.transform = 'rotate(0)';
          currentRotation = 0;
          totalRotation = 0;
          lastClickRotation = 0;
          isSpinning = false;
        }, 500);
      }, 1600);
    }, 1900);
  }

  function showSparkles() {
    const emojis = ['💎','✨','⭐','🌟','💫','👑','🎰','💰','🔥'];
    for (let i = 0; i < 40; i++) {
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      s.style.left = Math.random()*100 + 'vw';
      s.style.top = '50vh';
      document.body.appendChild(s);
      const dx = (Math.random()-0.5)*800;
      const dy = (Math.random()-0.5)*800;
      s.animate([
        { transform:'translate(0,0) scale(0) rotate(0)', opacity:1, filter:'drop-shadow(0 0 10px gold)' },
        { transform:`translate(${dx}px,${dy}px) scale(1.8) rotate(720deg)`, opacity:0, filter:'drop-shadow(0 0 20px gold)' }
      ], { duration:2000, easing:'ease-out' });
      setTimeout(()=>s.remove(), 2000);
    }
  }

  function spinAgain() { modal.classList.remove('show'); }
  function backToTitle() { modal.classList.remove('show'); window.scrollTo(0,0); }

  handle.addEventListener('mousedown', startDrag);
  window.addEventListener('mousemove', moveDrag);
  window.addEventListener('mouseup', endDrag);
  handle.addEventListener('touchstart', startDrag, {passive:false});
  window.addEventListener('touchmove', moveDrag, {passive:false});
  window.addEventListener('touchend', endDrag);
</script>
</body>
</html>
